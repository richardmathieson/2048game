<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>2048</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f13;
    --board: #1a1a24;
    --cell: #23233a;
    --text: #eee8e0;
    --accent: #f7c948;
    --glow: rgba(247, 201, 72, 0.15);
    --tile-radius: 16px;
    --gap: 10px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100dvh;
    overflow: hidden;
    touch-action: none;
    user-select: none;
  }

  /* Ambient background glow */
  body::before {
    content: '';
    position: fixed;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: radial-gradient(circle at 50% 50%, rgba(247,201,72,0.03) 0%, transparent 50%),
                radial-gradient(circle at 20% 80%, rgba(99,102,241,0.04) 0%, transparent 40%),
                radial-gradient(circle at 80% 20%, rgba(236,72,153,0.03) 0%, transparent 40%);
    animation: ambientShift 20s ease-in-out infinite;
    pointer-events: none;
    z-index: 0;
  }

  @keyframes ambientShift {
    0%, 100% { transform: translate(0, 0) rotate(0deg); }
    33% { transform: translate(2%, -1%) rotate(1deg); }
    66% { transform: translate(-1%, 2%) rotate(-1deg); }
  }

  .container {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    padding: 20px;
    width: 100%;
    max-width: 480px;
  }

  /* Header */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
  }

  .logo {
    font-family: 'Space Mono', monospace;
    font-size: 3rem;
    font-weight: 700;
    letter-spacing: -3px;
    background: linear-gradient(135deg, var(--accent), #ff6b6b, #c084fc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 30px rgba(247,201,72,0.3));
  }

  .scores {
    display: flex;
    gap: 10px;
  }

  .score-box {
    background: var(--board);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 12px;
    padding: 8px 16px;
    text-align: center;
    min-width: 80px;
    backdrop-filter: blur(10px);
  }

  .score-box .label {
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.35);
    font-weight: 600;
  }

  .score-box .value {
    font-family: 'Space Mono', monospace;
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--accent);
  }

  /* Score pop animation */
  .score-pop {
    animation: scoreBump 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes scoreBump {
    0% { transform: scale(1); }
    50% { transform: scale(1.2); }
    100% { transform: scale(1); }
  }

  /* Board */
  .board-wrapper {
    position: relative;
    width: 100%;
    aspect-ratio: 1;
  }

  .board {
    width: 100%;
    height: 100%;
    background: var(--board);
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.05);
    padding: var(--gap);
    display: grid;
    grid-template: repeat(4, 1fr) / repeat(4, 1fr);
    gap: var(--gap);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
    position: relative;
  }

  .cell {
    background: var(--cell);
    border-radius: var(--tile-radius);
    border: 1px solid rgba(255,255,255,0.03);
  }

  /* Tiles */
  .tile-layer {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    padding: var(--gap);
    pointer-events: none;
  }

  .tile {
    position: absolute;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: var(--tile-radius);
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    transition: top 0.15s ease, left 0.15s ease;
    z-index: 2;
    will-change: transform, top, left;
  }

  .tile.new {
    animation: tileAppear 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .tile.merged {
    animation: tileMerge 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 3;
  }

  @keyframes tileAppear {
    0% { transform: scale(0); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  @keyframes tileMerge {
    0% { transform: scale(1); }
    40% { transform: scale(1.25); }
    100% { transform: scale(1); }
  }

  /* Tile Colors */
  .tile[data-value="2"] {
    background: linear-gradient(145deg, #2a2a45, #33334d);
    color: #b0b0c8;
    font-size: 2rem;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .tile[data-value="4"] {
    background: linear-gradient(145deg, #33334d, #3d3d5c);
    color: #c0c0d8;
    font-size: 2rem;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .tile[data-value="8"] {
    background: linear-gradient(145deg, #c2703a, #d4813f);
    color: #fff;
    font-size: 2rem;
    box-shadow: 0 4px 20px rgba(194,112,58,0.35);
  }
  .tile[data-value="16"] {
    background: linear-gradient(145deg, #c75a3a, #d9633f);
    color: #fff;
    font-size: 1.9rem;
    box-shadow: 0 4px 20px rgba(199,90,58,0.4);
  }
  .tile[data-value="32"] {
    background: linear-gradient(145deg, #d14444, #e04f4f);
    color: #fff;
    font-size: 1.9rem;
    box-shadow: 0 4px 25px rgba(209,68,68,0.45);
  }
  .tile[data-value="64"] {
    background: linear-gradient(145deg, #d12e2e, #e03535);
    color: #fff;
    font-size: 1.9rem;
    box-shadow: 0 6px 30px rgba(209,46,46,0.5);
  }
  .tile[data-value="128"] {
    background: linear-gradient(145deg, #e0c23a, #f0d040);
    color: #1a1a2e;
    font-size: 1.6rem;
    box-shadow: 0 6px 35px rgba(224,194,58,0.45);
  }
  .tile[data-value="256"] {
    background: linear-gradient(145deg, #e0b830, #f0c835);
    color: #1a1a2e;
    font-size: 1.6rem;
    box-shadow: 0 6px 35px rgba(224,184,48,0.5);
  }
  .tile[data-value="512"] {
    background: linear-gradient(145deg, #e0a820, #f0b825);
    color: #1a1a2e;
    font-size: 1.6rem;
    box-shadow: 0 8px 40px rgba(224,168,32,0.55);
  }
  .tile[data-value="1024"] {
    background: linear-gradient(145deg, #7c3aed, #8b5cf6);
    color: #fff;
    font-size: 1.3rem;
    box-shadow: 0 8px 40px rgba(124,58,237,0.5);
  }
  .tile[data-value="2048"] {
    background: linear-gradient(145deg, var(--accent), #ffe066);
    color: #1a1a2e;
    font-size: 1.3rem;
    box-shadow: 0 10px 50px rgba(247,201,72,0.6);
    animation: tileWin 1s ease-in-out infinite alternate;
  }

  @keyframes tileWin {
    from { box-shadow: 0 10px 50px rgba(247,201,72,0.4); }
    to   { box-shadow: 0 10px 70px rgba(247,201,72,0.8); }
  }

  /* Super tiles */
  .tile[data-value="4096"],
  .tile[data-value="8192"] {
    background: linear-gradient(145deg, #ec4899, #f472b6);
    color: #fff;
    font-size: 1.2rem;
    box-shadow: 0 10px 50px rgba(236,72,153,0.5);
  }

  /* Controls */
  .controls {
    display: flex;
    gap: 10px;
    width: 100%;
  }

  .btn {
    flex: 1;
    padding: 14px;
    background: var(--board);
    border: 1px solid rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.6);
    border-radius: 14px;
    font-family: 'Outfit', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .btn:hover {
    background: rgba(255,255,255,0.08);
    color: var(--accent);
    border-color: rgba(247,201,72,0.2);
    transform: translateY(-1px);
  }

  .btn:active {
    transform: translateY(0);
  }

  /* Game Over / Win overlay */
  .overlay {
    position: absolute;
    inset: 0;
    background: rgba(15,15,19,0.85);
    backdrop-filter: blur(8px);
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    z-index: 10;
    animation: fadeIn 0.5s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .overlay h2 {
    font-family: 'Space Mono', monospace;
    font-size: 2.5rem;
    font-weight: 700;
  }

  .overlay .game-over-text {
    color: #ff6b6b;
  }

  .overlay .win-text {
    background: linear-gradient(135deg, var(--accent), #ff6b6b, #c084fc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .overlay p {
    color: rgba(255,255,255,0.5);
    font-size: 1rem;
  }

  .overlay .btn {
    flex: none;
    padding: 14px 40px;
  }

  /* Subtle grain */
  .board::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 20px;
    opacity: 0.015;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    pointer-events: none;
  }

  /* Mobile tweaks */
  @media (max-width: 480px) {
    .container { padding: 12px; gap: 14px; }
    .logo { font-size: 2.2rem; }
    .score-box { padding: 6px 12px; min-width: 65px; }
    .score-box .value { font-size: 1rem; }
    :root { --gap: 7px; --tile-radius: 12px; }
    .tile[data-value="2"], .tile[data-value="4"], .tile[data-value="8"],
    .tile[data-value="16"], .tile[data-value="32"], .tile[data-value="64"] { font-size: 1.6rem; }
    .tile[data-value="128"], .tile[data-value="256"], .tile[data-value="512"] { font-size: 1.3rem; }
    .tile[data-value="1024"], .tile[data-value="2048"],
    .tile[data-value="4096"], .tile[data-value="8192"] { font-size: 1.1rem; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo">2048</div>
    <div class="scores">
      <div class="score-box">
        <div class="label">Score</div>
        <div class="value" id="score">0</div>
      </div>
      <div class="score-box">
        <div class="label">Best</div>
        <div class="value" id="best">0</div>
      </div>
    </div>
  </div>

  <div class="board-wrapper">
    <div class="board" id="board"></div>
    <div class="tile-layer" id="tileLayer"></div>
    <div class="overlay" id="overlay" style="display:none"></div>
  </div>

  <div class="controls">
    <button class="btn" onclick="newGame()">New Game</button>
    <button class="btn" onclick="undo()">Undo</button>
  </div>
</div>

<script>
const SIZE = 4;
let grid, score, best = 0, prevState = null, gameOver = false, won = false, continueAfterWin = false;
let tileId = 0;
let tiles = {}; // id -> {value, row, col, el}

const boardEl = document.getElementById('board');
const tileLayerEl = document.getElementById('tileLayer');
const scoreEl = document.getElementById('score');
const bestEl = document.getElementById('best');
const overlayEl = document.getElementById('overlay');

// Build board cells
for (let i = 0; i < 16; i++) {
  const cell = document.createElement('div');
  cell.className = 'cell';
  boardEl.appendChild(cell);
}

function getTileSize() {
  const boardRect = boardEl.getBoundingClientRect();
  const gap = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--gap'));
  const padding = gap;
  const totalGaps = (SIZE - 1) * gap;
  const tileSize = (boardRect.width - 2 * padding - totalGaps) / SIZE;
  return { tileSize, gap, padding, boardWidth: boardRect.width };
}

function getTilePos(row, col) {
  const { tileSize, gap, padding } = getTileSize();
  return {
    top: padding + row * (tileSize + gap),
    left: padding + col * (tileSize + gap),
    size: tileSize
  };
}

function createTileEl(id, value, row, col, isNew) {
  const el = document.createElement('div');
  el.className = 'tile' + (isNew ? ' new' : '');
  el.dataset.value = value;
  el.textContent = value;
  el.id = 'tile-' + id;
  const pos = getTilePos(row, col);
  el.style.top = pos.top + 'px';
  el.style.left = pos.left + 'px';
  el.style.width = pos.size + 'px';
  el.style.height = pos.size + 'px';
  tileLayerEl.appendChild(el);
  return el;
}

function updateTilePosition(tile) {
  const pos = getTilePos(tile.row, tile.col);
  tile.el.style.top = pos.top + 'px';
  tile.el.style.left = pos.left + 'px';
  tile.el.style.width = pos.size + 'px';
  tile.el.style.height = pos.size + 'px';
}

function spawnTile() {
  const empty = [];
  for (let r = 0; r < SIZE; r++)
    for (let c = 0; c < SIZE; c++)
      if (grid[r][c] === 0) empty.push([r, c]);
  if (!empty.length) return null;
  const [r, c] = empty[Math.floor(Math.random() * empty.length)];
  const val = Math.random() < 0.9 ? 2 : 4;
  grid[r][c] = val;
  const id = tileId++;
  const el = createTileEl(id, val, r, c, true);
  tiles[id] = { value: val, row: r, col: c, el, id };
  return id;
}

function clearTiles() {
  tileLayerEl.innerHTML = '';
  tiles = {};
}

function newGame() {
  grid = Array.from({ length: SIZE }, () => Array(SIZE).fill(0));
  score = 0;
  gameOver = false;
  won = false;
  continueAfterWin = false;
  prevState = null;
  clearTiles();
  overlayEl.style.display = 'none';
  spawnTile();
  spawnTile();
  updateScore();
}

function saveState() {
  prevState = {
    grid: grid.map(r => [...r]),
    score,
    tileData: Object.values(tiles).map(t => ({ value: t.value, row: t.row, col: t.col }))
  };
}

function undo() {
  if (!prevState) return;
  grid = prevState.grid;
  score = prevState.score;
  gameOver = false;
  overlayEl.style.display = 'none';
  clearTiles();
  for (const td of prevState.tileData) {
    const id = tileId++;
    const el = createTileEl(id, td.value, td.row, td.col, false);
    tiles[id] = { value: td.value, row: td.row, col: td.col, el, id };
  }
  prevState = null;
  updateScore();
}

function updateScore() {
  scoreEl.textContent = score;
  if (score > best) {
    best = score;
    bestEl.textContent = best;
  }
  scoreEl.parentElement.classList.remove('score-pop');
  void scoreEl.parentElement.offsetWidth;
  scoreEl.parentElement.classList.add('score-pop');
}

function move(dir) {
  if (gameOver) return;
  saveState();

  let moved = false;
  let mergedScore = 0;
  const mergedTiles = [];
  const removeTiles = [];

  // Build tile map: grid position -> tile
  const tileMap = {};
  for (const t of Object.values(tiles)) {
    tileMap[t.row + ',' + t.col] = t;
  }

  const ranges = {
    up:    { rOrder: [0,1,2,3], cOrder: [0,1,2,3], dr: -1, dc: 0 },
    down:  { rOrder: [3,2,1,0], cOrder: [0,1,2,3], dr: 1, dc: 0 },
    left:  { rOrder: [0,1,2,3], cOrder: [0,1,2,3], dr: 0, dc: -1 },
    right: { rOrder: [0,1,2,3], cOrder: [3,2,1,0], dr: 0, dc: 1 },
  };

  const { rOrder, cOrder, dr, dc } = ranges[dir];
  const merged = Array.from({ length: SIZE }, () => Array(SIZE).fill(false));
  const newGrid = Array.from({ length: SIZE }, () => Array(SIZE).fill(0));
  const newTileMap = {};

  // We need to process tiles in correct order
  for (const r of rOrder) {
    for (const c of cOrder) {
      if (grid[r][c] === 0) continue;
      const tile = tileMap[r + ',' + c];
      let nr = r, nc = c;

      while (true) {
        const nnr = nr + dr, nnc = nc + dc;
        if (nnr < 0 || nnr >= SIZE || nnc < 0 || nnc >= SIZE) break;
        if (newGrid[nnr][nnc] === 0) {
          nr = nnr; nc = nnc;
        } else if (newGrid[nnr][nnc] === grid[r][c] && !merged[nnr][nnc]) {
          nr = nnr; nc = nnc;
          break;
        } else {
          break;
        }
      }

      if (nr !== r || nc !== c) moved = true;

      if (newGrid[nr][nc] === grid[r][c] && newGrid[nr][nc] !== 0) {
        // Merge
        const newVal = grid[r][c] * 2;
        newGrid[nr][nc] = newVal;
        merged[nr][nc] = true;
        mergedScore += newVal;

        // Remove existing tile at destination
        const existingTile = newTileMap[nr + ',' + nc];
        if (existingTile) {
          removeTiles.push(existingTile);
        }

        // Move current tile to merge position
        tile.row = nr;
        tile.col = nc;
        tile.value = newVal;
        updateTilePosition(tile);
        mergedTiles.push(tile);
        newTileMap[nr + ',' + nc] = tile;
        moved = true;
      } else {
        newGrid[nr][nc] = grid[r][c];
        tile.row = nr;
        tile.col = nc;
        updateTilePosition(tile);
        newTileMap[nr + ',' + nc] = tile;
      }
    }
  }

  if (!moved) {
    prevState = null;
    return;
  }

  grid = newGrid;
  score += mergedScore;

  // Remove old tiles after transition
  setTimeout(() => {
    for (const t of removeTiles) {
      t.el.remove();
      delete tiles[t.id];
    }
    for (const t of mergedTiles) {
      t.el.dataset.value = t.value;
      t.el.textContent = t.value;
      t.el.classList.add('merged');
      // Update size for merged
      const pos = getTilePos(t.row, t.col);
      t.el.style.width = pos.size + 'px';
      t.el.style.height = pos.size + 'px';
      setTimeout(() => t.el.classList.remove('merged'), 300);
    }
    spawnTile();
    updateScore();
    checkGameState();
  }, 160);
}

function checkGameState() {
  // Check for 2048 win
  if (!won && !continueAfterWin) {
    for (let r = 0; r < SIZE; r++)
      for (let c = 0; c < SIZE; c++)
        if (grid[r][c] === 2048) {
          won = true;
          showOverlay('win');
          return;
        }
  }

  // Check game over
  for (let r = 0; r < SIZE; r++)
    for (let c = 0; c < SIZE; c++)
      if (grid[r][c] === 0) return;

  for (let r = 0; r < SIZE; r++)
    for (let c = 0; c < SIZE; c++) {
      if (c < SIZE - 1 && grid[r][c] === grid[r][c+1]) return;
      if (r < SIZE - 1 && grid[r][c] === grid[r+1][c]) return;
    }

  gameOver = true;
  showOverlay('gameover');
}

function showOverlay(type) {
  overlayEl.style.display = 'flex';
  if (type === 'win') {
    overlayEl.innerHTML = `
      <h2 class="win-text">You Win!</h2>
      <p>Score: ${score}</p>
      <button class="btn" onclick="continueGame()">Keep Going</button>
      <button class="btn" onclick="newGame()">New Game</button>
    `;
  } else {
    overlayEl.innerHTML = `
      <h2 class="game-over-text">Game Over</h2>
      <p>Final Score: ${score}</p>
      <button class="btn" onclick="newGame()">Try Again</button>
      <button class="btn" onclick="undo()">Undo</button>
    `;
  }
}

function continueGame() {
  continueAfterWin = true;
  overlayEl.style.display = 'none';
}

// Input handling
document.addEventListener('keydown', e => {
  const map = { ArrowUp: 'up', ArrowDown: 'down', ArrowLeft: 'left', ArrowRight: 'right',
                 w: 'up', s: 'down', a: 'left', d: 'right' };
  if (map[e.key]) {
    e.preventDefault();
    move(map[e.key]);
  }
});

// Touch / swipe
let touchStartX, touchStartY;
document.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });

document.addEventListener('touchend', e => {
  if (touchStartX == null) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  const absDx = Math.abs(dx), absDy = Math.abs(dy);
  if (Math.max(absDx, absDy) < 30) return;

  if (absDx > absDy) {
    move(dx > 0 ? 'right' : 'left');
  } else {
    move(dy > 0 ? 'down' : 'up');
  }
  touchStartX = null;
}, { passive: true });

// Resize handling
window.addEventListener('resize', () => {
  for (const t of Object.values(tiles)) {
    updateTilePosition(t);
  }
});

newGame();
</script>
</body>
</html>
