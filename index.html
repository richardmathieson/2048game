<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Rise of Empires — 2048</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Outfit:wght@300;400;600;800&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0c0a0e;
    --board: #171320;
    --cell: #1f1a2e;
    --text: #eee8e0;
    --gold: #d4a63a;
    --gold-glow: rgba(212,166,58,0.25);
    --blood: #8b2020;
    --culture: #6d5acd;
    --military: #c44;
    --economy: #d4a63a;
    --faith: #5ba0d4;
    --tile-radius: 14px;
    --gap: 8px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100dvh;
    overflow-x: hidden;
    touch-action: none;
    user-select: none;
  }

  body::before {
    content:'';
    position:fixed; inset:0;
    background:
      radial-gradient(ellipse at 30% 20%, rgba(212,166,58,0.04) 0%, transparent 50%),
      radial-gradient(ellipse at 70% 80%, rgba(139,32,32,0.05) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(109,90,205,0.03) 0%, transparent 60%);
    pointer-events:none; z-index:0;
    animation: bgPulse 15s ease-in-out infinite alternate;
  }
  @keyframes bgPulse {
    0% { opacity:0.8; } 100% { opacity:1.2; }
  }

  .app {
    position:relative; z-index:1;
    display:flex; flex-direction:column; align-items:center;
    gap:12px; padding:12px;
    width:100%; max-width:520px;
  }

  /* ─── HEADER ─── */
  .header {
    display:flex; justify-content:space-between; align-items:center;
    width:100%; gap: 10px;
  }
  .title-block {
    display:flex; flex-direction:column;
  }
  .title {
    font-family:'Cinzel', serif;
    font-size:1.5rem; font-weight:900;
    background: linear-gradient(135deg, var(--gold), #f0d060, var(--gold));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    filter: drop-shadow(0 0 12px rgba(212,166,58,0.4));
    line-height:1.1;
  }
  .era-label {
    font-size:0.65rem; letter-spacing:3px; text-transform:uppercase;
    color: rgba(255,255,255,0.35); font-weight:600; margin-top:2px;
  }
  .scores {
    display:flex; gap:8px;
  }
  .score-box {
    background: rgba(255,255,255,0.03);
    border:1px solid rgba(255,255,255,0.06);
    border-radius:10px; padding:6px 14px;
    text-align:center; min-width:70px;
  }
  .score-box .label {
    font-size:0.55rem; text-transform:uppercase;
    letter-spacing:2px; color:rgba(255,255,255,0.3); font-weight:600;
  }
  .score-box .value {
    font-family:'Space Mono',monospace;
    font-size:1.1rem; font-weight:700; color:var(--gold);
  }
  .score-pop { animation: sBump 0.3s cubic-bezier(.34,1.56,.64,1); }
  @keyframes sBump { 0%{transform:scale(1)} 50%{transform:scale(1.15)} 100%{transform:scale(1)} }

  /* ─── EMPIRE STATS BAR ─── */
  .empire-stats {
    width:100%;
    display:flex; gap:6px;
    background: rgba(255,255,255,0.02);
    border:1px solid rgba(255,255,255,0.04);
    border-radius:12px; padding:8px 12px;
  }
  .stat {
    flex:1; display:flex; flex-direction:column; align-items:center; gap:3px;
  }
  .stat-icon { font-size:1rem; }
  .stat-bar-bg {
    width:100%; height:4px; background:rgba(255,255,255,0.06);
    border-radius:2px; overflow:hidden;
  }
  .stat-bar-fill {
    height:100%; border-radius:2px;
    transition: width 0.6s cubic-bezier(.34,1.56,.64,1);
  }
  .stat-label {
    font-size:0.5rem; text-transform:uppercase; letter-spacing:1px;
    color:rgba(255,255,255,0.3); font-weight:600;
  }
  .stat-val {
    font-family:'Space Mono',monospace;
    font-size:0.65rem; font-weight:700;
  }
  .stat.military .stat-bar-fill { background: linear-gradient(90deg, #c44, #e66); }
  .stat.military .stat-val { color:#e66; }
  .stat.economy .stat-bar-fill { background: linear-gradient(90deg, #d4a63a, #f0d060); }
  .stat.economy .stat-val { color:#f0d060; }
  .stat.culture .stat-bar-fill { background: linear-gradient(90deg, #6d5acd, #a78bfa); }
  .stat.culture .stat-val { color:#a78bfa; }
  .stat.faith .stat-bar-fill { background: linear-gradient(90deg, #5ba0d4, #7dd3fc); }
  .stat.faith .stat-val { color:#7dd3fc; }

  /* ─── BOARD ─── */
  .board-wrapper { position:relative; width:100%; aspect-ratio:1; }
  .board {
    width:100%; height:100%;
    background: var(--board);
    border-radius:18px;
    border:1px solid rgba(255,255,255,0.05);
    padding:var(--gap);
    display:grid; grid-template:repeat(4,1fr)/repeat(4,1fr);
    gap:var(--gap);
    box-shadow:0 20px 60px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.04);
    position:relative;
  }
  .cell {
    background:var(--cell); border-radius:var(--tile-radius);
    border:1px solid rgba(255,255,255,0.02);
  }
  .tile-layer {
    position:absolute; top:0; left:0; width:100%; height:100%;
    padding:var(--gap); pointer-events:none;
  }
  .tile {
    position:absolute;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    border-radius:var(--tile-radius);
    font-family:'Space Mono',monospace; font-weight:700;
    transition: top 0.14s ease, left 0.14s ease;
    z-index:2; will-change:transform,top,left;
    line-height:1.1;
  }
  .tile .tile-name {
    font-family:'Cinzel',serif;
    font-size:0.45rem; font-weight:600;
    letter-spacing:1px; text-transform:uppercase;
    opacity:0.7; margin-top:1px;
  }
  .tile.new { animation: tAppear 0.25s cubic-bezier(.34,1.56,.64,1); }
  .tile.merged { animation: tMerge 0.3s cubic-bezier(.34,1.56,.64,1); z-index:3; }
  @keyframes tAppear { 0%{transform:scale(0);opacity:0} 100%{transform:scale(1);opacity:1} }
  @keyframes tMerge { 0%{transform:scale(1)} 40%{transform:scale(1.22)} 100%{transform:scale(1)} }

  /* Tile styles by era */
  .tile[data-value="2"] {
    background: linear-gradient(145deg, #2a2540, #332e4d);
    color:#9090b0; font-size:1.5rem;
    border:1px solid rgba(255,255,255,0.06);
  }
  .tile[data-value="4"] {
    background: linear-gradient(145deg, #33304d, #3d3960);
    color:#a8a8c8; font-size:1.5rem;
    border:1px solid rgba(255,255,255,0.07);
  }
  .tile[data-value="8"] {
    background: linear-gradient(145deg, #5a4020, #7a5a2a);
    color:#f0d080; font-size:1.5rem;
    box-shadow:0 3px 15px rgba(122,90,42,0.3);
    border:1px solid rgba(240,208,128,0.15);
  }
  .tile[data-value="16"] {
    background: linear-gradient(145deg, #704820, #906028);
    color:#ffe0a0; font-size:1.4rem;
    box-shadow:0 4px 18px rgba(144,96,40,0.35);
    border:1px solid rgba(255,224,160,0.15);
  }
  .tile[data-value="32"] {
    background: linear-gradient(145deg, #8b2020, #a52828);
    color:#ffd0d0; font-size:1.4rem;
    box-shadow:0 4px 22px rgba(139,32,32,0.5);
    border:1px solid rgba(255,100,100,0.2);
  }
  .tile[data-value="64"] {
    background: linear-gradient(145deg, #1a5a2a, #207030);
    color:#a0f0b0; font-size:1.4rem;
    box-shadow:0 5px 25px rgba(32,112,48,0.4);
    border:1px solid rgba(160,240,176,0.15);
  }
  .tile[data-value="128"] {
    background: linear-gradient(145deg, #6d5acd, #7d6ae0);
    color:#fff; font-size:1.2rem;
    box-shadow:0 6px 30px rgba(109,90,205,0.5);
    border:1px solid rgba(160,140,255,0.2);
  }
  .tile[data-value="256"] {
    background: linear-gradient(145deg, #2050a0, #2868c0);
    color:#c0e0ff; font-size:1.2rem;
    box-shadow:0 6px 30px rgba(40,104,192,0.45);
    border:1px solid rgba(100,180,255,0.2);
  }
  .tile[data-value="512"] {
    background: linear-gradient(145deg, #d4a63a, #e8be48);
    color:#2a1800; font-size:1.2rem;
    box-shadow:0 8px 35px rgba(212,166,58,0.55);
    border:1px solid rgba(255,220,100,0.3);
  }
  .tile[data-value="1024"] {
    background: linear-gradient(145deg, #b8860b, #daa520);
    color:#fff; font-size:1rem;
    box-shadow:0 8px 40px rgba(218,165,32,0.5);
    border:1px solid rgba(255,215,0,0.3);
  }
  .tile[data-value="2048"] {
    background: linear-gradient(145deg, #ffd700, #ffe44d);
    color:#1a0a00; font-size:1rem;
    box-shadow:0 10px 50px rgba(255,215,0,0.6);
    animation: empireGlow 2s ease-in-out infinite alternate;
    border:1px solid rgba(255,255,200,0.5);
  }
  @keyframes empireGlow {
    from { box-shadow:0 10px 50px rgba(255,215,0,0.4); }
    to   { box-shadow:0 10px 70px rgba(255,215,0,0.8), 0 0 100px rgba(255,215,0,0.2); }
  }
  .tile[data-value="4096"],.tile[data-value="8192"] {
    background:linear-gradient(145deg,#ff6b9d,#c084fc);
    color:#fff; font-size:0.9rem;
    box-shadow:0 10px 50px rgba(236,72,153,0.5);
  }

  /* ─── CONTROLS ─── */
  .controls { display:flex; gap:8px; width:100%; }
  .btn {
    flex:1; padding:12px;
    background:rgba(255,255,255,0.03);
    border:1px solid rgba(255,255,255,0.06);
    color:rgba(255,255,255,0.5);
    border-radius:12px;
    font-family:'Outfit',sans-serif;
    font-size:0.8rem; font-weight:600;
    letter-spacing:1px; text-transform:uppercase;
    cursor:pointer; transition:all 0.2s ease;
  }
  .btn:hover {
    background:rgba(255,255,255,0.07);
    color:var(--gold);
    border-color:rgba(212,166,58,0.2);
    transform:translateY(-1px);
  }

  /* ─── EVENT LOG ─── */
  .event-log {
    width:100%;
    max-height:80px; overflow-y:auto;
    display:flex; flex-direction:column; gap:4px;
    padding: 6px 0;
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,0.1) transparent;
  }
  .log-entry {
    font-size:0.65rem; color:rgba(255,255,255,0.35);
    padding:3px 10px;
    border-left:2px solid rgba(212,166,58,0.2);
    animation: logIn 0.3s ease;
    font-style:italic;
  }
  @keyframes logIn { from{opacity:0;transform:translateX(-10px)} to{opacity:1;transform:translateX(0)} }

  /* ─── DECISION MODAL ─── */
  .modal-overlay {
    position:fixed; inset:0; z-index:100;
    background:rgba(0,0,0,0.8);
    backdrop-filter:blur(12px);
    display:flex; align-items:center; justify-content:center;
    padding:20px;
    animation: fadeIn 0.4s ease;
  }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }

  .modal {
    background: linear-gradient(160deg, #1a1528, #12101c);
    border:1px solid rgba(212,166,58,0.15);
    border-radius:20px;
    padding:28px 24px;
    max-width:440px; width:100%;
    box-shadow:0 30px 80px rgba(0,0,0,0.8), 0 0 80px rgba(212,166,58,0.08);
    animation: modalIn 0.5s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes modalIn { from{transform:scale(0.85) translateY(20px);opacity:0} to{transform:scale(1) translateY(0);opacity:1} }

  .modal-era {
    font-family:'Cinzel',serif;
    font-size:0.65rem; letter-spacing:3px; text-transform:uppercase;
    color:var(--gold); font-weight:600; margin-bottom:4px;
  }
  .modal-title {
    font-family:'Cinzel',serif;
    font-size:1.5rem; font-weight:900;
    color:var(--text); margin-bottom:10px;
    line-height:1.2;
  }
  .modal-desc {
    font-size:0.85rem; color:rgba(255,255,255,0.5);
    line-height:1.6; margin-bottom:20px;
  }
  .modal-choices {
    display:flex; flex-direction:column; gap:10px;
  }
  .choice-btn {
    position:relative;
    background:rgba(255,255,255,0.03);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:14px;
    padding:14px 16px;
    cursor:pointer;
    text-align:left;
    transition:all 0.25s ease;
    overflow:hidden;
  }
  .choice-btn::before {
    content:'';
    position:absolute; inset:0;
    background:linear-gradient(90deg, transparent, rgba(212,166,58,0.05), transparent);
    opacity:0; transition:opacity 0.3s;
  }
  .choice-btn:hover {
    border-color:rgba(212,166,58,0.3);
    transform:translateX(4px);
    background:rgba(255,255,255,0.05);
  }
  .choice-btn:hover::before { opacity:1; }
  .choice-btn .choice-name {
    font-family:'Cinzel',serif;
    font-size:0.9rem; font-weight:700;
    color:var(--text); margin-bottom:4px;
  }
  .choice-btn .choice-desc {
    font-size:0.72rem; color:rgba(255,255,255,0.4);
    line-height:1.4;
  }
  .choice-btn .choice-effects {
    display:flex; gap:8px; margin-top:8px; flex-wrap:wrap;
  }
  .effect-tag {
    font-size:0.6rem; font-weight:700;
    padding:2px 8px; border-radius:6px;
    letter-spacing:0.5px;
  }
  .effect-tag.positive { background:rgba(80,200,80,0.12); color:#60e060; }
  .effect-tag.negative { background:rgba(200,60,60,0.12); color:#e06060; }
  .effect-tag.neutral  { background:rgba(100,160,255,0.12); color:#80c0ff; }

  /* ─── GAME OVER / WIN ─── */
  .overlay {
    position:absolute; inset:0;
    background:rgba(12,10,14,0.88);
    backdrop-filter:blur(8px);
    border-radius:18px;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    gap:14px; z-index:10;
    animation:fadeIn 0.5s ease;
  }
  .overlay h2 {
    font-family:'Cinzel',serif; font-size:2rem; font-weight:900;
  }
  .overlay .go-text { color:#e06060; }
  .overlay .win-text {
    background:linear-gradient(135deg, var(--gold), #ff6b6b, #c084fc);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  }
  .overlay p { color:rgba(255,255,255,0.45); font-size:0.9rem; }

  /* ─── RESPONSIVE ─── */
  @media (max-width:480px) {
    .app { padding:8px; gap:8px; }
    .title { font-size:1.2rem; }
    .score-box { padding:4px 10px; min-width:58px; }
    .score-box .value { font-size:0.9rem; }
    :root { --gap:6px; --tile-radius:10px; }
    .tile { font-size:1.2rem !important; }
    .tile .tile-name { font-size:0.35rem !important; }
    .modal { padding:20px 16px; }
    .modal-title { font-size:1.2rem; }
    .empire-stats { padding: 6px 8px; }
  }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="title-block">
      <div class="title">Rise of Empires</div>
      <div class="era-label" id="eraLabel">The Dawn of Civilization</div>
    </div>
    <div class="scores">
      <div class="score-box">
        <div class="label">Score</div>
        <div class="value" id="score">0</div>
      </div>
      <div class="score-box">
        <div class="label">Year</div>
        <div class="value" id="year">4000 BC</div>
      </div>
    </div>
  </div>

  <div class="empire-stats">
    <div class="stat military">
      <div class="stat-icon">⚔️</div>
      <div class="stat-bar-bg"><div class="stat-bar-fill" id="milBar" style="width:10%"></div></div>
      <div class="stat-val" id="milVal">10</div>
    </div>
    <div class="stat economy">
      <div class="stat-icon">🪙</div>
      <div class="stat-bar-bg"><div class="stat-bar-fill" id="ecoBar" style="width:10%"></div></div>
      <div class="stat-val" id="ecoVal">10</div>
    </div>
    <div class="stat culture">
      <div class="stat-icon">🏛️</div>
      <div class="stat-bar-bg"><div class="stat-bar-fill" id="culBar" style="width:10%"></div></div>
      <div class="stat-val" id="culVal">10</div>
    </div>
    <div class="stat faith">
      <div class="stat-icon">✨</div>
      <div class="stat-bar-bg"><div class="stat-bar-fill" id="faiBar" style="width:10%"></div></div>
      <div class="stat-val" id="faiVal">10</div>
    </div>
  </div>

  <div class="board-wrapper">
    <div class="board" id="board"></div>
    <div class="tile-layer" id="tileLayer"></div>
    <div class="overlay" id="overlay" style="display:none"></div>
  </div>

  <div class="controls">
    <button class="btn" onclick="newGame()">New Empire</button>
    <button class="btn" onclick="undo()">Undo</button>
  </div>

  <div class="event-log" id="eventLog"></div>
</div>

<div class="modal-overlay" id="modalOverlay" style="display:none">
  <div class="modal" id="modal"></div>
</div>

<script>
// ═══════════════════════════════════════════
//  TILE ERA NAMES
// ═══════════════════════════════════════════
const TILE_NAMES = {
  2:'Camp', 4:'Village', 8:'Town', 16:'City',
  32:'Kingdom', 64:'Republic', 128:'Empire',
  256:'Dynasty', 512:'Dominion', 1024:'Hegemony',
  2048:'Eternal Empire', 4096:'Ascension', 8192:'Myth'
};
const ERA_NAMES = {
  2:'The Dawn of Civilization', 4:'The Age of Settlements', 8:'The Bronze Age',
  16:'The Iron Age', 32:'The Age of Kingdoms', 64:'The Classical Era',
  128:'The Imperial Age', 256:'The Golden Age', 512:'The Age of Exploration',
  1024:'The Age of Industry', 2048:'The Modern Era'
};
const YEAR_MAP = {
  2:'4000 BC', 4:'3000 BC', 8:'2000 BC', 16:'800 BC', 32:'400 BC',
  64:'100 AD', 128:'500 AD', 256:'1100 AD', 512:'1500 AD',
  1024:'1800 AD', 2048:'2048 AD'
};

// ═══════════════════════════════════════════
//  STRATEGIC EVENTS
// ═══════════════════════════════════════════
const EVENTS = {
  16: {
    title: 'The First Walls',
    desc: 'Your growing city attracts attention — both traders and raiders. Your council demands a decision on how to protect the people.',
    choices: [
      { name:'Build Great Walls', desc:'Fortify the city with massive stone walls. Safety comes at a cost.', effects:{military:15, economy:-5}, effectTags:[{t:'⚔️ Military +15',c:'positive'},{t:'🪙 Economy -5',c:'negative'}], log:'Built great walls around the city.' },
      { name:'Hire Mercenaries', desc:'Pay foreign warriors to patrol your lands. Quick but unreliable.', effects:{military:10, economy:-10, culture:5}, effectTags:[{t:'⚔️ +10',c:'positive'},{t:'🪙 -10',c:'negative'},{t:'🏛️ +5',c:'positive'}], log:'Hired mercenary forces.' },
      { name:'Open the Gates', desc:'Welcome all — traders, scholars, refugees. Prosperity through openness.', effects:{economy:15, culture:10, military:-5}, effectTags:[{t:'🪙 +15',c:'positive'},{t:'🏛️ +10',c:'positive'},{t:'⚔️ -5',c:'negative'}], log:'Opened the gates to all peoples.' },
    ]
  },
  32: {
    title: 'A Crown of Iron',
    desc: 'The tribal chiefs gather. They speak of unity under one ruler. But who shall lead — and how?',
    choices: [
      { name:'Seize the Crown', desc:'Declare yourself sovereign by force. Crush dissent swiftly.', effects:{military:20, faith:-10, culture:-5}, effectTags:[{t:'⚔️ +20',c:'positive'},{t:'✨ -10',c:'negative'},{t:'🏛️ -5',c:'negative'}], log:'Seized the crown by force. The Kingdom rises.', bonus:'score', bonusAmt:50 },
      { name:'Council of Elders', desc:'Form a council where chiefs share power. Slower, but stable.', effects:{culture:15, faith:10, economy:5}, effectTags:[{t:'🏛️ +15',c:'positive'},{t:'✨ +10',c:'positive'},{t:'🪙 +5',c:'positive'}], log:'Formed a Council of Elders.' },
      { name:'Divine Right', desc:'Claim the gods have chosen you. The priests back your claim.', effects:{faith:25, military:5, culture:-10}, effectTags:[{t:'✨ +25',c:'positive'},{t:'⚔️ +5',c:'positive'},{t:'🏛️ -10',c:'negative'}], log:'Claimed divine right to rule.' },
    ]
  },
  64: {
    title: 'The Great Library',
    desc: 'Scholars propose building a center of knowledge. But your generals want a fortress, and merchants want a grand market.',
    choices: [
      { name:'Build the Library', desc:'Invest in knowledge. Scholars flock from distant lands.', effects:{culture:25, faith:10, military:-5}, effectTags:[{t:'🏛️ +25',c:'positive'},{t:'✨ +10',c:'positive'},{t:'⚔️ -5',c:'negative'}], log:'Built the Great Library.', bonus:'score', bonusAmt:100 },
      { name:'Build the Fortress', desc:'An impenetrable citadel. Your enemies will tremble.', effects:{military:25, economy:-10}, effectTags:[{t:'⚔️ +25',c:'positive'},{t:'🪙 -10',c:'negative'}], log:'Built an impenetrable Fortress.' },
      { name:'Build the Grand Market', desc:'A hub of commerce connecting trade routes across the known world.', effects:{economy:25, culture:5}, effectTags:[{t:'🪙 +25',c:'positive'},{t:'🏛️ +5',c:'positive'}], log:'Built the Grand Market.' },
    ]

    title: 'Across the Horizon',
    desc: 'Your navigators have found new continents. The world is far larger than anyone imagined.',
    choices: [

// ═══════════════════════════════════════════
//  GAME STATE
// ═══════════════════════════════════════════
const SIZE = 4;
let grid, score, prevState = null, gameOverFlag = false, wonFlag = false, continueAfterWin = false;
let tileId = 0, tileObjs = {};
let stats = { military:10, economy:10, culture:10, faith:10 };
let triggeredEvents = new Set();
let moveLocked = false;
let highestTile = 2;

const boardEl = document.getElementById('board');
const tileLayerEl = document.getElementById('tileLayer');
const scoreEl = document.getElementById('score');
const yearEl = document.getElementById('year');
const eraLabelEl = document.getElementById('eraLabel');
const overlayEl = document.getElementById('overlay');
const modalOverlay = document.getElementById('modalOverlay');
const modalEl = document.getElementById('modal');
const eventLogEl = document.getElementById('eventLog');

for(let i=0;i<16;i++){const c=document.createElement('div');c.className='cell';boardEl.appendChild(c);}

function getTileSize(){
  const br=boardEl.getBoundingClientRect();
  const g=parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--gap'));
  const ts=(br.width-2*g-(SIZE-1)*g)/SIZE;
  return{tileSize:ts,gap:g,padding:g};
}
function getTilePos(r,c){const{tileSize:ts,gap:g,padding:p}=getTileSize();return{top:p+r*(ts+g),left:p+c*(ts+g),size:ts};}

function createTileEl(id,val,r,c,isNew){
  const el=document.createElement('div');
  el.className='tile'+(isNew?' new':'');
  el.dataset.value=val;
  el.id='tile-'+id;
  const num=document.createElement('span');
  num.textContent=val;
  el.appendChild(num);
  if(TILE_NAMES[val]){
    const nm=document.createElement('div');
    nm.className='tile-name';
    nm.textContent=TILE_NAMES[val];
    el.appendChild(nm);
  }
  const pos=getTilePos(r,c);
  el.style.top=pos.top+'px';el.style.left=pos.left+'px';
  el.style.width=pos.size+'px';el.style.height=pos.size+'px';
  tileLayerEl.appendChild(el);
  return el;
}
function updateTilePos(t){
  const p=getTilePos(t.row,t.col);
  t.el.style.top=p.top+'px';t.el.style.left=p.left+'px';
  t.el.style.width=p.size+'px';t.el.style.height=p.size+'px';
}
function spawnTile(){
  const empty=[];
  for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++)if(grid[r][c]===0)empty.push([r,c]);
  if(!empty.length)return null;
  const[r,c]=empty[Math.floor(Math.random()*empty.length)];
  const val=Math.random()<0.9?2:4;
  grid[r][c]=val;
  const id=tileId++;
  const el=createTileEl(id,val,r,c,true);
  tileObjs[id]={value:val,row:r,col:c,el,id};
  return id;
}
function clearTiles(){tileLayerEl.innerHTML='';tileObjs={};}

function updateStats(){
  for(const k of['military','economy','culture','faith']){
    stats[k]=Math.max(0,Math.min(100,stats[k]));
  }
  document.getElementById('milBar').style.width=stats.military+'%';
  document.getElementById('milVal').textContent=stats.military;
  document.getElementById('ecoBar').style.width=stats.economy+'%';
  document.getElementById('ecoVal').textContent=stats.economy;
  document.getElementById('culBar').style.width=stats.culture+'%';
  document.getElementById('culVal').textContent=stats.culture;
  document.getElementById('faiBar').style.width=stats.faith+'%';
  document.getElementById('faiVal').textContent=stats.faith;
}

function updateEra(){
  let maxTile=2;
  for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++)if(grid[r][c]>maxTile)maxTile=grid[r][c];
  highestTile=maxTile;
  // Find closest era
  const eraKeys=Object.keys(ERA_NAMES).map(Number).sort((a,b)=>a-b);
  let era=eraKeys[0];
  for(const k of eraKeys)if(maxTile>=k)era=k;
  eraLabelEl.textContent=ERA_NAMES[era]||ERA_NAMES[2];
  const yearKeys=Object.keys(YEAR_MAP).map(Number).sort((a,b)=>a-b);
  let yr=yearKeys[0];
  for(const k of yearKeys)if(maxTile>=k)yr=k;
  yearEl.textContent=YEAR_MAP[yr]||YEAR_MAP[2];
}

function addLog(msg){
  const d=document.createElement('div');
  d.className='log-entry';
  d.textContent='📜 '+msg;
  eventLogEl.prepend(d);
  if(eventLogEl.children.length>20)eventLogEl.removeChild(eventLogEl.lastChild);
}

function updateScore(){
  scoreEl.textContent=score;
  scoreEl.parentElement.classList.remove('score-pop');
  void scoreEl.parentElement.offsetWidth;
  scoreEl.parentElement.classList.add('score-pop');
}

function checkEvent(maxMergedValue){
  // Trigger event for the highest newly merged value
  const eventKeys=Object.keys(EVENTS).map(Number).sort((a,b)=>a-b);
  for(const k of eventKeys){
    if(maxMergedValue>=k && !triggeredEvents.has(k)){
      triggeredEvents.add(k);
      showEvent(k);
      return;
    }
  }
}

function showEvent(key){
  moveLocked=true;
  const ev=EVENTS[key];
  let html=`<div class="modal-era">${ERA_NAMES[key]||'A New Age'}</div>`;
  html+=`<div class="modal-title">${ev.title}</div>`;
  html+=`<div class="modal-desc">${ev.desc}</div>`;
  html+=`<div class="modal-choices">`;
  ev.choices.forEach((ch,i)=>{
    html+=`<div class="choice-btn" onclick="makeChoice(${key},${i})">`;
    html+=`<div class="choice-name">${ch.name}</div>`;
    html+=`<div class="choice-desc">${ch.desc}</div>`;
    html+=`<div class="choice-effects">`;
    ch.effectTags.forEach(tag=>{
      html+=`<span class="effect-tag ${tag.c}">${tag.t}</span>`;
    });
    html+=`</div></div>`;
  });
  html+=`</div>`;
  modalEl.innerHTML=html;
  modalOverlay.style.display='flex';
}

window.makeChoice=function(key,idx){
  const ch=EVENTS[key].choices[idx];
  if(ch.effects.military) stats.military+=ch.effects.military;
  if(ch.effects.economy) stats.economy+=ch.effects.economy;
  if(ch.effects.culture) stats.culture+=ch.effects.culture;
  if(ch.effects.faith) stats.faith+=ch.effects.faith;
  if(ch.bonus==='score') score+=ch.bonusAmt;
  updateStats();
  updateScore();
  addLog(ch.log);
  modalOverlay.style.display='none';
  moveLocked=false;
};

function newGame(){
  grid=Array.from({length:SIZE},()=>Array(SIZE).fill(0));
  score=0; gameOverFlag=false; wonFlag=false; continueAfterWin=false;
  prevState=null; highestTile=2;
  stats={military:10,economy:10,culture:10,faith:10};
  triggeredEvents=new Set(); moveLocked=false;
  clearTiles();
  overlayEl.style.display='none';
  modalOverlay.style.display='none';
  eventLogEl.innerHTML='';
  spawnTile(); spawnTile();
  updateScore(); updateStats(); updateEra();
  addLog('A band of settlers makes camp beside a river...');
}

function saveState(){
  prevState={
    grid:grid.map(r=>[...r]), score,
    stats:{...stats},
    tileData:Object.values(tileObjs).map(t=>({value:t.value,row:t.row,col:t.col}))
  };
}
function undo(){
  if(!prevState||moveLocked)return;
  grid=prevState.grid; score=prevState.score;
  stats={...prevState.stats};
  gameOverFlag=false;
  overlayEl.style.display='none';
  clearTiles();
  for(const td of prevState.tileData){
    const id=tileId++;
    const el=createTileEl(id,td.value,td.row,td.col,false);
    tileObjs[id]={value:td.value,row:td.row,col:td.col,el,id};
  }
  prevState=null;
  updateScore(); updateStats(); updateEra();
}

function move(dir){
  if(gameOverFlag||moveLocked)return;
  saveState();
  let moved=false, mergedScore=0;
  const mergedTiles=[], removeTiles=[];
  let maxMergedValue=0;

  const tileMap={};
  for(const t of Object.values(tileObjs)) tileMap[t.row+','+t.col]=t;

  const ranges={
    up:{rOrder:[0,1,2,3],cOrder:[0,1,2,3],dr:-1,dc:0},
    down:{rOrder:[3,2,1,0],cOrder:[0,1,2,3],dr:1,dc:0},
    left:{rOrder:[0,1,2,3],cOrder:[0,1,2,3],dr:0,dc:-1},
    right:{rOrder:[0,1,2,3],cOrder:[3,2,1,0],dr:0,dc:1},
  };
  const{rOrder,cOrder,dr,dc}=ranges[dir];
  const merged=Array.from({length:SIZE},()=>Array(SIZE).fill(false));
  const newGrid=Array.from({length:SIZE},()=>Array(SIZE).fill(0));
  const newTileMap={};

  for(const r of rOrder){
    for(const c of cOrder){
      if(grid[r][c]===0)continue;
      const tile=tileMap[r+','+c];
      let nr=r,nc=c;
      while(true){
        const nnr=nr+dr,nnc=nc+dc;
        if(nnr<0||nnr>=SIZE||nnc<0||nnc>=SIZE)break;
        if(newGrid[nnr][nnc]===0){nr=nnr;nc=nnc;}
        else if(newGrid[nnr][nnc]===grid[r][c]&&!merged[nnr][nnc]){nr=nnr;nc=nnc;break;}
        else break;
      }
      if(nr!==r||nc!==c)moved=true;
      if(newGrid[nr][nc]===grid[r][c]&&newGrid[nr][nc]!==0){
        const nv=grid[r][c]*2;
        newGrid[nr][nc]=nv;
        merged[nr][nc]=true;
        mergedScore+=nv;
        if(nv>maxMergedValue)maxMergedValue=nv;
        const ex=newTileMap[nr+','+nc];
        if(ex)removeTiles.push(ex);
        tile.row=nr;tile.col=nc;tile.value=nv;
        updateTilePos(tile);
        mergedTiles.push(tile);
        newTileMap[nr+','+nc]=tile;
        moved=true;
      } else {
        newGrid[nr][nc]=grid[r][c];
        tile.row=nr;tile.col=nc;
        updateTilePos(tile);
        newTileMap[nr+','+nc]=tile;
      }
    }
  }
  if(!moved){prevState=null;return;}
  grid=newGrid;
  score+=mergedScore;

  // Small stat gains from merging
  if(mergedScore>0){
    const gain=Math.floor(mergedScore/20);
    if(gain>0){
      stats.economy+=Math.ceil(gain*0.3);
      stats.culture+=Math.ceil(gain*0.2);
    }
  }

  setTimeout(()=>{
    for(const t of removeTiles){t.el.remove();delete tileObjs[t.id];}
    for(const t of mergedTiles){
      t.el.dataset.value=t.value;
      t.el.querySelector('span').textContent=t.value;
      // Update tile name
      const existingName=t.el.querySelector('.tile-name');
      if(TILE_NAMES[t.value]){
        if(existingName) existingName.textContent=TILE_NAMES[t.value];
        else{const nm=document.createElement('div');nm.className='tile-name';nm.textContent=TILE_NAMES[t.value];t.el.appendChild(nm);}
      } else if(existingName) existingName.remove();
      const p=getTilePos(t.row,t.col);
      t.el.style.width=p.size+'px';t.el.style.height=p.size+'px';
      t.el.classList.add('merged');
      setTimeout(()=>t.el.classList.remove('merged'),300);
    }
    spawnTile();
    updateScore(); updateStats(); updateEra();
    // Check events
    if(maxMergedValue>0) checkEvent(maxMergedValue);
    checkGameState();
  },150);
}

function checkGameState(){
  if(!wonFlag&&!continueAfterWin){
    for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++)
      if(grid[r][c]===2048){wonFlag=true;showOverlay('win');return;}
  }
  for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++)if(grid[r][c]===0)return;
  for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++){
    if(c<SIZE-1&&grid[r][c]===grid[r][c+1])return;
    if(r<SIZE-1&&grid[r][c]===grid[r+1][c])return;
  }
  gameOverFlag=true;
  showOverlay('gameover');
}

function showOverlay(type){
  overlayEl.style.display='flex';
  // Summary of empire
  const summary = `⚔️${stats.military} 🪙${stats.economy} 🏛️${stats.culture} ✨${stats.faith}`;
  if(type==='win'){
    overlayEl.innerHTML=`
      <h2 class="win-text">Eternal Empire!</h2>
      <p>Score: ${score} · ${summary}</p>
      <button class="btn" onclick="continueGame()">Keep Expanding</button>
      <button class="btn" onclick="newGame()">New Empire</button>`;
  } else {
    // Determine how empire fell based on lowest stat
    const entries=Object.entries(stats);
    entries.sort((a,b)=>a[1]-b[1]);
    const weakest=entries[0][0];
    const reasons={military:'conquered by invaders',economy:'bankrupted by debt',culture:'forgotten by history',faith:'torn apart by internal strife'};
    overlayEl.innerHTML=`
      <h2 class="go-text">Empire Fallen</h2>
      <p>Your empire was ${reasons[weakest]}.</p>
      <p>Score: ${score} · ${summary}</p>
      <button class="btn" onclick="newGame()">Rise Again</button>
      <button class="btn" onclick="undo()">Undo</button>`;
  }
}
function continueGame(){continueAfterWin=true;overlayEl.style.display='none';}

// ─── INPUT ───
document.addEventListener('keydown',e=>{
  const map={ArrowUp:'up',ArrowDown:'down',ArrowLeft:'left',ArrowRight:'right',w:'up',s:'down',a:'left',d:'right'};
  if(map[e.key]){e.preventDefault();move(map[e.key]);}
});
let tx,ty;
document.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
document.addEventListener('touchend',e=>{
  if(tx==null)return;
  const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;
  if(Math.max(Math.abs(dx),Math.abs(dy))<30)return;
  if(Math.abs(dx)>Math.abs(dy))move(dx>0?'right':'left');
  else move(dy>0?'down':'up');
  tx=null;
},{passive:true});

window.addEventListener('resize',()=>{for(const t of Object.values(tileObjs))updateTilePos(t);});

newGame();
</script>
