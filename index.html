<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Rise of Empires — 2048</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Outfit:wght@300;400;600;800&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0c0a0e;
    --board: #171320;
    --cell: #1f1a2e;
    --text: #eee8e0;
    --gold: #d4a63a;
    --gold-glow: rgba(212,166,58,0.25);
    --blood: #8b2020;
    --culture: #6d5acd;
    --military: #c44;
    --economy: #d4a63a;
    --faith: #5ba0d4;
    --tile-radius: 14px;
    --gap: 8px;
    --danger: #e04040;
  }
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100dvh;
    overflow-x: hidden;
    touch-action: none;
    user-select: none;
  }

  body::before {
    content:'';
    position:fixed; inset:0;
    background:
      radial-gradient(ellipse at 30% 20%, rgba(212,166,58,0.04) 0%, transparent 50%),
      radial-gradient(ellipse at 70% 80%, rgba(139,32,32,0.05) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(109,90,205,0.03) 0%, transparent 60%);
    pointer-events:none; z-index:0;
    animation: bgPulse 15s ease-in-out infinite alternate;
  }
  @keyframes bgPulse { 0% { opacity:0.8; } 100% { opacity:1.2; } }

  .app {
    position:relative; z-index:1;
    display:flex; flex-direction:column; align-items:center;
    gap:10px; padding:12px;
    width:100%; max-width:520px;
  }

  /* ─── HEADER ─── */
  .header {
    display:flex; justify-content:space-between; align-items:center;
    width:100%; gap: 10px;
  }
  .title-block { display:flex; flex-direction:column; }
  .title {
    font-family:'Cinzel', serif;
    font-size:1.5rem; font-weight:900;
    background: linear-gradient(135deg, var(--gold), #f0d060, var(--gold));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    filter: drop-shadow(0 0 12px rgba(212,166,58,0.4));
    line-height:1.1;
  }
  .era-label {
    font-size:0.6rem; letter-spacing:3px; text-transform:uppercase;
    color: rgba(255,255,255,0.35); font-weight:600; margin-top:2px;
    transition: color 0.5s, text-shadow 0.5s;
  }
  .era-label.advancing {
    color: var(--gold);
    text-shadow: 0 0 20px rgba(212,166,58,0.6);
  }
  .scores { display:flex; gap:6px; }
  .score-box {
    background: rgba(255,255,255,0.03);
    border:1px solid rgba(255,255,255,0.06);
    border-radius:10px; padding:5px 12px;
    text-align:center; min-width:64px;
  }
  .score-box .label {
    font-size:0.5rem; text-transform:uppercase;
    letter-spacing:2px; color:rgba(255,255,255,0.3); font-weight:600;
  }
  .score-box .value {
    font-family:'Space Mono',monospace;
    font-size:1rem; font-weight:700; color:var(--gold);
  }
  .score-pop { animation: sBump 0.3s cubic-bezier(.34,1.56,.64,1); }
  @keyframes sBump { 0%{transform:scale(1)} 50%{transform:scale(1.15)} 100%{transform:scale(1)} }

  /* ─── COMBO / STREAK BAR ─── */
  .combo-bar {
    width:100%;
    display:flex; align-items:center; gap:10px;
    background: rgba(255,255,255,0.02);
    border:1px solid rgba(255,255,255,0.04);
    border-radius:10px; padding:5px 12px;
    min-height:32px;
    transition: all 0.3s;
  }
  .combo-bar.active {
    border-color: rgba(212,166,58,0.25);
    background: rgba(212,166,58,0.04);
  }
  .combo-bar.hot {
    border-color: rgba(255,100,100,0.3);
    background: rgba(255,60,60,0.05);
    animation: comboGlow 0.6s ease-in-out infinite alternate;
  }
  .combo-bar.legendary {
    border-color: rgba(200,130,255,0.4);
    background: rgba(160,100,255,0.06);
    animation: legendaryGlow 0.8s ease-in-out infinite alternate;
  }
  @keyframes comboGlow {
    from { box-shadow: 0 0 10px rgba(255,100,60,0.1); }
    to { box-shadow: 0 0 25px rgba(255,100,60,0.25); }
  }
  @keyframes legendaryGlow {
    from { box-shadow: 0 0 10px rgba(180,100,255,0.15); }
    to { box-shadow: 0 0 30px rgba(180,100,255,0.35), 0 0 60px rgba(212,166,58,0.15); }
  }
  .combo-label {
    font-size:0.5rem; text-transform:uppercase;
    letter-spacing:2px; color:rgba(255,255,255,0.3); font-weight:600;
    white-space:nowrap;
  }
  .combo-icons { display:flex; gap:3px; flex:1; flex-wrap:wrap; }
  .combo-icon {
    width:14px; height:14px; border-radius:50%;
    background: var(--gold);
    animation: comboPop 0.35s cubic-bezier(.34,1.56,.64,1);
    box-shadow: 0 0 8px rgba(212,166,58,0.4);
  }
  .combo-icon.fire {
    background: linear-gradient(135deg, #ff6b35, #ff2d2d);
    box-shadow: 0 0 12px rgba(255,60,60,0.5);
  }
  .combo-icon.legendary {
    background: linear-gradient(135deg, #c084fc, #ff6b9d, #ffd700);
    box-shadow: 0 0 14px rgba(200,130,255,0.6);
  }
  @keyframes comboPop { 0%{transform:scale(0)} 60%{transform:scale(1.4)} 100%{transform:scale(1)} }
  .combo-mult {
    font-family:'Space Mono',monospace;
    font-size:0.8rem; font-weight:700; color:var(--gold);
    min-width:36px; text-align:right;
    transition: all 0.2s;
  }
  .combo-mult.hot { color:#ff6b35; }
  .combo-mult.legendary { color:#c084fc; }

  /* ─── EMPIRE STATS BAR ─── */
  .empire-stats {
    width:100%;
    display:flex; gap:6px;
    background: rgba(255,255,255,0.02);
    border:1px solid rgba(255,255,255,0.04);
    border-radius:12px; padding:7px 10px;
  }
  .stat { flex:1; display:flex; flex-direction:column; align-items:center; gap:2px; }
  .stat-icon { font-size:0.9rem; }
  .stat-bar-bg {
    width:100%; height:4px; background:rgba(255,255,255,0.06);
    border-radius:2px; overflow:hidden;
  }
  .stat-bar-fill {
    height:100%; border-radius:2px;
    transition: width 0.6s cubic-bezier(.34,1.56,.64,1);
  }
  .stat-val {
    font-family:'Space Mono',monospace;
    font-size:0.6rem; font-weight:700;
  }
  .stat.military .stat-bar-fill { background: linear-gradient(90deg, #c44, #e66); }
  .stat.military .stat-val { color:#e66; }
  .stat.economy .stat-bar-fill { background: linear-gradient(90deg, #d4a63a, #f0d060); }
  .stat.economy .stat-val { color:#f0d060; }
  .stat.culture .stat-bar-fill { background: linear-gradient(90deg, #6d5acd, #a78bfa); }
  .stat.culture .stat-val { color:#a78bfa; }
  .stat.faith .stat-bar-fill { background: linear-gradient(90deg, #5ba0d4, #7dd3fc); }
  .stat.faith .stat-val { color:#7dd3fc; }

  .stat.danger .stat-icon { animation: dangerPulse 0.8s ease-in-out infinite; }
  .stat.danger .stat-bar-fill { background: linear-gradient(90deg, #e04040, #ff6060) !important; }
  .stat.danger .stat-val { color: #ff6060 !important; }
  @keyframes dangerPulse {
    0%,100% { transform: scale(1); } 50% { transform: scale(1.3); }
  }

  /* ─── BOARD ─── */
  .board-wrapper { position:relative; width:100%; aspect-ratio:1; }
  .board {
    width:100%; height:100%;
    background: var(--board);
    border-radius:18px;
    border:1px solid rgba(255,255,255,0.05);
    padding:var(--gap);
    display:grid; grid-template:repeat(4,1fr)/repeat(4,1fr);
    gap:var(--gap);
    box-shadow:0 20px 60px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.04);
    position:relative;
    transition: transform 0.08s ease;
  }
  .board.shake { animation: boardShake 0.4s ease-out; }
  @keyframes boardShake {
    0%,100%{transform:translate(0,0) rotate(0)}
    15%{transform:translate(-3px,2px) rotate(-0.3deg)}
    30%{transform:translate(3px,-2px) rotate(0.3deg)}
    45%{transform:translate(-2px,1px) rotate(-0.2deg)}
    60%{transform:translate(2px,-1px) rotate(0.2deg)}
    75%{transform:translate(-1px,1px) rotate(-0.1deg)}
  }
  .board.bigshake { animation: bigBoardShake 0.5s ease-out; }
  @keyframes bigBoardShake {
    0%,100%{transform:translate(0,0) rotate(0)}
    10%{transform:translate(-5px,3px) rotate(-0.5deg)}
    20%{transform:translate(5px,-4px) rotate(0.5deg)}
    30%{transform:translate(-4px,2px) rotate(-0.4deg)}
    40%{transform:translate(4px,-3px) rotate(0.4deg)}
    50%{transform:translate(-3px,2px) rotate(-0.3deg)}
    60%{transform:translate(3px,-1px) rotate(0.3deg)}
    70%{transform:translate(-2px,1px) rotate(-0.2deg)}
    80%{transform:translate(1px,-1px) rotate(0.1deg)}
  }
  .cell {
    background:var(--cell); border-radius:var(--tile-radius);
    border:1px solid rgba(255,255,255,0.02);
  }
  .tile-layer {
    position:absolute; top:0; left:0; width:100%; height:100%;
    padding:var(--gap); pointer-events:none;
  }

  /* ─── PARTICLES ─── */
  .particle-layer {
    position:absolute; top:0; left:0; width:100%; height:100%;
    pointer-events:none; z-index:20; overflow:hidden;
    border-radius:18px;
  }
  .particle {
    position:absolute; border-radius:50%;
    pointer-events:none; will-change:transform,opacity;
  }
  .particle.spark {
    animation: sparkFly var(--dur, 0.6s) ease-out forwards;
  }
  @keyframes sparkFly {
    0% { transform: translate(0,0) scale(1); opacity:1; }
    100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity:0; }
  }
  .particle.ring {
    border-radius:50%;
    border:2px solid var(--ring-color, rgba(212,166,58,0.6));
    background:transparent;
    animation: ringExpand 0.6s ease-out forwards;
  }
  @keyframes ringExpand {
    0% { transform:scale(0); opacity:1; }
    100% { transform:scale(3); opacity:0; }
  }

  /* ─── BOARD FLASH (from v1) ─── */
  .board-flash {
    position:absolute; inset:0; border-radius:18px;
    pointer-events:none; z-index:15; opacity:0;
  }
  .board-flash.fire { animation:flashFire .4s ease-out; }
  .board-flash.golden { animation:flashGold .6s ease-out; }
  .board-flash.epic { animation:flashEpic .8s ease-out; }
  @keyframes flashFire { 0%{opacity:.3;background:radial-gradient(circle,rgba(255,100,50,.4),transparent 70%)} 100%{opacity:0} }
  @keyframes flashGold { 0%{opacity:.4;background:radial-gradient(circle,rgba(212,166,58,.5),transparent 70%)} 100%{opacity:0} }
  @keyframes flashEpic { 0%{opacity:.5;background:radial-gradient(circle,rgba(160,120,255,.5),rgba(255,200,50,.2),transparent 70%)} 100%{opacity:0} }

  /* ─── FLOATING SCORE ─── */
  .float-score {
    position:absolute;
    font-family:'Space Mono',monospace;
    font-weight:700;
    pointer-events:none;
    z-index:25;
    animation: floatUp 1.2s ease-out forwards;
    text-shadow: 0 2px 10px rgba(0,0,0,0.6);
  }
  @keyframes floatUp {
    0% { opacity:1; transform:translateY(0) scale(1.2); }
    50% { opacity:1; transform:translateY(-30px) scale(1); }
    100% { opacity:0; transform:translateY(-60px) scale(0.8); }
  }

  /* ─── MERGE FLAVOR TOAST ─── */
  .merge-flavor {
    position:absolute;
    font-family:'Cinzel',serif;
    font-weight:700; font-size:0.65rem;
    pointer-events:none; z-index:26;
    text-shadow: 0 2px 8px rgba(0,0,0,0.9);
    white-space:nowrap; letter-spacing:0.5px;
    animation: flavorFloat 2s ease-out forwards;
  }
  @keyframes flavorFloat {
    0% { opacity:0; transform:translate(-50%,-50%) scale(0.7); }
    12% { opacity:1; transform:translate(-50%,-50%) scale(1.05); }
    20% { transform:translate(-50%,-50%) scale(1); }
    100% { opacity:0; transform:translate(-50%, calc(-50% - 40px)) scale(0.85); }
  }
  .merge-flavor.small { color:rgba(255,255,255,0.5); font-size:0.55rem; }
  .merge-flavor.medium { color:#f0d080; font-size:0.65rem; }
  .merge-flavor.large { color:#ffd700; font-size:0.75rem; }
  .merge-flavor.epic { color:#fff; font-size:0.85rem; text-shadow:0 0 20px rgba(212,166,58,.8); }

  /* ─── ERA BANNER ─── */
  .era-banner {
    position:fixed; top:0; left:0; right:0;
    z-index:200;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:20px 20px 30px;
    background: linear-gradient(180deg, rgba(12,10,14,0.97), rgba(12,10,14,0.6), rgba(12,10,14,0));
    pointer-events:none;
    animation: bannerSlide 3.5s ease-in-out forwards;
  }
  @keyframes bannerSlide {
    0% { transform:translateY(-100%); opacity:0; }
    12% { transform:translateY(0); opacity:1; }
    75% { transform:translateY(0); opacity:1; }
    100% { transform:translateY(-100%); opacity:0; }
  }
  .era-banner-inner { text-align:center; }
  .era-banner-sub {
    font-size:0.55rem; letter-spacing:4px; text-transform:uppercase;
    color:var(--gold); font-weight:600; margin-bottom:4px;
    font-family:'Cinzel',serif;
  }
  .era-banner-title {
    font-family:'Cinzel',serif;
    font-size:1.6rem; font-weight:900;
    background: linear-gradient(135deg, var(--gold), #fff, var(--gold));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    filter: drop-shadow(0 0 20px rgba(212,166,58,0.5));
    margin-bottom:6px;
  }
  .era-banner-desc {
    font-size:0.7rem; color:rgba(255,255,255,0.45);
    font-style:italic; max-width:320px; margin:0 auto;
    line-height:1.4;
  }

  /* ─── SCREEN FLASH ─── */
  .screen-flash {
    position:fixed; inset:0;
    pointer-events:none; z-index:50;
    animation: flash 0.4s ease-out forwards;
  }
  @keyframes flash { 0% { opacity:0.35; } 100% { opacity:0; } }

  /* ─── ACHIEVEMENT TOAST ─── */
  .toast-container {
    position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
    z-index:150;
    display:flex; flex-direction:column; gap:8px; align-items:center;
    pointer-events:none;
  }
  .toast {
    background: linear-gradient(135deg, rgba(30,25,50,0.95), rgba(20,15,35,0.95));
    border:1px solid rgba(212,166,58,0.3);
    border-radius:14px;
    padding:10px 20px;
    display:flex; align-items:center; gap:10px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.6), 0 0 30px rgba(212,166,58,0.1);
    animation: toastIn 2.5s ease-in-out forwards;
    backdrop-filter:blur(12px);
  }
  @keyframes toastIn {
    0% { transform:translateY(30px) scale(0.9); opacity:0; }
    15% { transform:translateY(0) scale(1); opacity:1; }
    75% { transform:translateY(0) scale(1); opacity:1; }
    100% { transform:translateY(10px); opacity:0; }
  }
  .toast-icon { font-size:1.4rem; }
  .toast-text {
    font-family:'Cinzel',serif;
    font-size:0.8rem; font-weight:700; color:var(--gold);
  }
  .toast-desc {
    font-size:0.65rem; color:rgba(255,255,255,0.45); margin-top:2px;
  }

  /* ─── TILES ─── */
  .tile {
    position:absolute;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    border-radius:var(--tile-radius);
    font-family:'Space Mono',monospace; font-weight:700;
    transition: top 0.14s ease, left 0.14s ease;
    z-index:2; will-change:transform,top,left;
    line-height:1.1;
  }
  .tile .tile-name {
    font-family:'Cinzel',serif;
    font-size:0.45rem; font-weight:600;
    letter-spacing:1px; text-transform:uppercase;
    opacity:0.7; margin-top:1px;
  }
  .tile.new { animation: tAppear 0.25s cubic-bezier(.34,1.56,.64,1); }
  .tile.merged { animation: tMerge 0.35s cubic-bezier(.34,1.56,.64,1); z-index:3; }
  @keyframes tAppear { 0%{transform:scale(0);opacity:0} 100%{transform:scale(1);opacity:1} }
  @keyframes tMerge { 0%{transform:scale(1)} 30%{transform:scale(1.28)} 60%{transform:scale(0.95)} 100%{transform:scale(1)} }

  .tile[data-value="2"]   { background:linear-gradient(145deg,#2a2540,#332e4d); color:#9090b0; font-size:1.5rem; border:1px solid rgba(255,255,255,.06); }
  .tile[data-value="4"]   { background:linear-gradient(145deg,#33304d,#3d3960); color:#a8a8c8; font-size:1.5rem; border:1px solid rgba(255,255,255,.07); }
  .tile[data-value="8"]   { background:linear-gradient(145deg,#5a4020,#7a5a2a); color:#f0d080; font-size:1.5rem; box-shadow:0 3px 15px rgba(122,90,42,.3); border:1px solid rgba(240,208,128,.15); }
  .tile[data-value="16"]  { background:linear-gradient(145deg,#704820,#906028); color:#ffe0a0; font-size:1.4rem; box-shadow:0 4px 18px rgba(144,96,40,.35); border:1px solid rgba(255,224,160,.15); }
  .tile[data-value="32"]  { background:linear-gradient(145deg,#8b2020,#a52828); color:#ffd0d0; font-size:1.4rem; box-shadow:0 4px 22px rgba(139,32,32,.5); border:1px solid rgba(255,100,100,.2); }
  .tile[data-value="64"]  { background:linear-gradient(145deg,#1a5a2a,#207030); color:#a0f0b0; font-size:1.4rem; box-shadow:0 5px 25px rgba(32,112,48,.4); border:1px solid rgba(160,240,176,.15); }
  .tile[data-value="128"] { background:linear-gradient(145deg,#6d5acd,#7d6ae0); color:#fff; font-size:1.2rem; box-shadow:0 6px 30px rgba(109,90,205,.5); border:1px solid rgba(160,140,255,.2); }
  .tile[data-value="256"] { background:linear-gradient(145deg,#2050a0,#2868c0); color:#c0e0ff; font-size:1.2rem; box-shadow:0 6px 30px rgba(40,104,192,.45); border:1px solid rgba(100,180,255,.2); }
  .tile[data-value="512"] { background:linear-gradient(145deg,#d4a63a,#e8be48); color:#2a1800; font-size:1.2rem; box-shadow:0 8px 35px rgba(212,166,58,.55); border:1px solid rgba(255,220,100,.3); }
  .tile[data-value="1024"]{ background:linear-gradient(145deg,#b8860b,#daa520); color:#fff; font-size:1rem; box-shadow:0 8px 40px rgba(218,165,32,.5); border:1px solid rgba(255,215,0,.3); }
  .tile[data-value="2048"]{ background:linear-gradient(145deg,#ffd700,#ffe44d); color:#1a0a00; font-size:1rem; box-shadow:0 10px 50px rgba(255,215,0,.6); animation: empireGlow 2s ease-in-out infinite alternate; border:1px solid rgba(255,255,200,.5); }
  @keyframes empireGlow { from{box-shadow:0 10px 50px rgba(255,215,0,.4)} to{box-shadow:0 10px 70px rgba(255,215,0,.8),0 0 100px rgba(255,215,0,.2)} }
  .tile[data-value="4096"],.tile[data-value="8192"]{ background:linear-gradient(145deg,#ff6b9d,#c084fc); color:#fff; font-size:.9rem; box-shadow:0 10px 50px rgba(236,72,153,.5); }

  /* ─── CONTROLS ─── */
  .controls { display:flex; gap:6px; width:100%; }
  .btn {
    flex:1; padding:10px;
    background:rgba(255,255,255,0.03);
    border:1px solid rgba(255,255,255,0.06);
    color:rgba(255,255,255,0.5);
    border-radius:12px;
    font-family:'Outfit',sans-serif;
    font-size:0.75rem; font-weight:600;
    letter-spacing:1px; text-transform:uppercase;
    cursor:pointer; transition:all 0.2s ease;
  }
  .btn:hover {
    background:rgba(255,255,255,0.07);
    color:var(--gold);
    border-color:rgba(212,166,58,0.2);
    transform:translateY(-1px);
  }
  .btn-sound { flex:0 0 auto; width:44px; font-size:1rem; padding:8px 0; }

  /* ─── EVENT LOG ─── */
  .event-log {
    width:100%;
    max-height:72px; overflow-y:auto;
    display:flex; flex-direction:column; gap:3px;
    padding:4px 0;
    scrollbar-width:thin;
    scrollbar-color:rgba(255,255,255,0.1) transparent;
  }
  .log-entry {
    font-size:0.6rem; color:rgba(255,255,255,0.35);
    padding:2px 10px;
    border-left:2px solid rgba(212,166,58,0.2);
    animation: logIn 0.3s ease;
    font-style:italic;
  }
  @keyframes logIn { from{opacity:0;transform:translateX(-10px)} to{opacity:1;transform:translateX(0)} }

  /* ─── DECISION MODAL ─── */
  .modal-overlay {
    position:fixed; inset:0; z-index:100;
    background:rgba(0,0,0,0.85);
    backdrop-filter:blur(14px);
    display:flex; align-items:center; justify-content:center;
    padding:20px;
    animation: fadeIn 0.4s ease;
  }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  .modal {
    background: linear-gradient(160deg, #1a1528, #12101c);

<script>
// ═══════════════════════════════════════════
//  AUDIO ENGINE
// ═══════════════════════════════════════════
let audioCtx = null;
let soundEnabled = true;

function initAudio() {
  if (audioCtx) return;
  try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
  catch(e) { soundEnabled = false; }
}

function playMergeSound(value) {
  if (!soundEnabled || !audioCtx) return;
  try {
    const log = Math.log2(value);
    const freqs = [220, 261, 329, 392, 440, 523, 659, 784, 880, 1046, 1174];
    const freq = freqs[Math.min(Math.floor(log) - 1, freqs.length - 1)] || 440;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    const filter = audioCtx.createBiquadFilter();
    osc.type = value >= 128 ? 'triangle' : 'sine';
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(freq * 1.02, audioCtx.currentTime + 0.1);
    filter.type = 'lowpass';
    filter.frequency.setValueAtTime(2000 + log * 500, audioCtx.currentTime);
    const vol = Math.min(0.15 + log * 0.02, 0.35);
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3 + log * 0.03);
    osc.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + 0.4 + log * 0.03);
    if (value >= 64) {
      const osc2 = audioCtx.createOscillator();
      const gain2 = audioCtx.createGain();
      osc2.type = 'sine';
      osc2.frequency.setValueAtTime(freq * 1.5, audioCtx.currentTime);
      gain2.gain.setValueAtTime(vol * 0.3, audioCtx.currentTime);
      gain2.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.25);
      osc2.connect(gain2); gain2.connect(audioCtx.destination);
      osc2.start(); osc2.stop(audioCtx.currentTime + 0.3);
    }
  } catch(e) {}
}

function playComboSound(streak) {
  if (!soundEnabled || !audioCtx) return;
  try {
    const freq = 600 + streak * 80;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(freq * 1.5, audioCtx.currentTime + 0.15);
    gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + 0.25);
  } catch(e) {}
}

function playEraSound() {
  if (!soundEnabled || !audioCtx) return;
  try {
    const notes = [261, 329, 392, 523];
    notes.forEach((freq, i) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = i === 0 ? 'triangle' : 'sine';
      osc.frequency.setValueAtTime(freq, audioCtx.currentTime + i * 0.08);
      gain.gain.setValueAtTime(0, audioCtx.currentTime);
      gain.gain.linearRampToValueAtTime(0.15, audioCtx.currentTime + i * 0.08 + 0.05);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.2);
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.start(audioCtx.currentTime + i * 0.08);
      osc.stop(audioCtx.currentTime + 1.5);
    });
  } catch(e) {}
}

function toggleSound() {
  initAudio();
  soundEnabled = !soundEnabled;
  document.getElementById('soundBtn').textContent = soundEnabled ? '🔊' : '🔇';
}

// ═══════════════════════════════════════════
//  PARTICLE SYSTEM
// ═══════════════════════════════════════════
const particleLayerEl = document.getElementById('particleLayer');

function spawnParticles(x, y, count, color, size, spread) {
  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    p.className = 'particle spark';
    const angle = (Math.PI * 2 * i / count) + (Math.random() - 0.5) * 0.8;
    const dist = spread * (0.5 + Math.random() * 0.5);
    const dx = Math.cos(angle) * dist;
    const dy = Math.sin(angle) * dist;
    const s = size * (0.5 + Math.random() * 0.5);
    const dur = 0.4 + Math.random() * 0.4;
    p.style.cssText = `left:${x}px;top:${y}px;width:${s}px;height:${s}px;background:${color};box-shadow:0 0 ${s*2}px ${color};--dx:${dx}px;--dy:${dy}px;--dur:${dur}s;`;
    particleLayerEl.appendChild(p);
    setTimeout(() => p.remove(), dur * 1000 + 50);
  }
}

function spawnRing(x, y, color) {
  const r = document.createElement('div');
  r.className = 'particle ring';
  const s = 20;
  r.style.cssText = `left:${x - s/2}px;top:${y - s/2}px;width:${s}px;height:${s}px;--ring-color:${color};`;
  particleLayerEl.appendChild(r);
  setTimeout(() => r.remove(), 650);
}

// ═══════════════════════════════════════════
//  FLOATING SCORE POPUP
// ═══════════════════════════════════════════
function showFloatingScore(x, y, points, color) {
  const el = document.createElement('div');
  el.className = 'float-score';
  const bonus = comboStreak > 1 ? ` ×${getComboMultiplier().toFixed(1)}` : '';
  el.textContent = `+${points}${bonus}`;
  el.style.cssText = `left:${x}px;top:${y}px;color:${color};font-size:${Math.min(0.9 + points/300, 1.8)}rem;`;
  particleLayerEl.appendChild(el);
  setTimeout(() => el.remove(), 1250);
}

//  MERGE FLAVOR TEXT (from v1)

function showMergeFlavor(x, y, value) {
  const flavors = MERGE_FLAVORS[value];
  if (!flavors) return;
  const text = flavors[Math.floor(Math.random() * flavors.length)];
  const el = document.createElement('div');
  let sizeClass = 'small';
  if (value >= 512) sizeClass = 'epic';
  else if (value >= 128) sizeClass = 'large';
  else if (value >= 32) sizeClass = 'medium';
  el.className = 'merge-flavor ' + sizeClass;
  el.textContent = text;
  el.style.left = x + 'px';
  el.style.top = (y + 30) + 'px';
  particleLayerEl.appendChild(el);
  setTimeout(() => el.remove(), 2100);
}

function boardFlash(type) {

function showEraBanner(eraName, eraDesc) {
  const existing = document.querySelector('.era-banner');
  if (existing) existing.remove();
  const el = document.createElement('div');
  el.className = 'era-banner';
  const descHTML = eraDesc ? `<div class="era-banner-desc">${eraDesc}</div>` : '';
  el.innerHTML = `<div class="era-banner-inner"><div class="era-banner-sub">A New Age Dawns</div><div class="era-banner-title">${eraName}</div>${descHTML}</div>`;
  document.body.appendChild(el);
  playEraSound();
  boardFlash('epic');
  setTimeout(() => el.remove(), 3600);
}

  'tile_128': { icon:'🏛️', text:'Empire Founded', desc:'Created a 128 tile', condition: (ctx) => ctx.maxTile >= 128 },
  'tile_256': { icon:'🏰', text:'Dynasty Rises', desc:'Created a 256 tile', condition: (ctx) => ctx.maxTile >= 256 },
  'tile_512': { icon:'⛵', text:'New Horizons', desc:'Created a 512 tile', condition: (ctx) => ctx.maxTile >= 512 },
  'tile_1024': { icon:'🏭', text:'Industrial Might', desc:'Created a 1024 tile', condition: (ctx) => ctx.maxTile >= 1024 },
  'balanced': { icon:'⚖️', text:'Perfect Balance', desc:'All stats above 40', condition: (ctx) => Object.values(stats).every(v => v >= 40) },
  'warrior': { icon:'🗡️', text:'Warlord', desc:'Military above 80', condition: (ctx) => stats.military >= 80 },
  'merchant': { icon:'💰', text:'Trade Baron', desc:'Economy above 80', condition: (ctx) => stats.economy >= 80 },
  'moves_100': { icon:'🎲', text:'Persistent', desc:'Made 100 moves', condition: (ctx) => moveCount >= 100 },
};

function checkAchievements(ctx) {
  for (const [key, ach] of Object.entries(ACHIEVEMENTS)) {
    if (!shownAchievements.has(key) && ach.condition(ctx)) {
      shownAchievements.add(key);
      showToast(ach.icon, ach.text, ach.desc);
    }
  }
}

function showToast(icon, text, desc) {
  const container = document.getElementById('toastContainer');
  const el = document.createElement('div');
  el.className = 'toast';
  el.innerHTML = `<div class="toast-icon">${icon}</div><div><div class="toast-text">${text}</div><div class="toast-desc">${desc}</div></div>`;
  container.appendChild(el);
  setTimeout(() => el.remove(), 2600);
}

// ═══════════════════════════════════════════
//  TILE POSITIONING
// ═══════════════════════════════════════════
function getTileSize(){
  const br=boardEl.getBoundingClientRect();
  const g=parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--gap'));
  const ts=(br.width-2*g-(SIZE-1)*g)/SIZE;
  return{tileSize:ts,gap:g,padding:g};
}
function getTilePos(r,c){const{tileSize:ts,gap:g,padding:p}=getTileSize();return{top:p+r*(ts+g),left:p+c*(ts+g),size:ts};}

function createTileEl(id,val,r,c,isNew){
  const el=document.createElement('div');
  el.className='tile'+(isNew?' new':'');
  el.dataset.value=val; el.id='tile-'+id;
  const num=document.createElement('span');
  num.textContent=val; el.appendChild(num);
  if(TILE_NAMES[val]){
    const nm=document.createElement('div');
    nm.className='tile-name'; nm.textContent=TILE_NAMES[val]; el.appendChild(nm);
  }
  const pos=getTilePos(r,c);
  el.style.top=pos.top+'px';el.style.left=pos.left+'px';
  el.style.width=pos.size+'px';el.style.height=pos.size+'px';
  tileLayerEl.appendChild(el); return el;
}
function updateTilePos(t){
  const p=getTilePos(t.row,t.col);
  t.el.style.top=p.top+'px';t.el.style.left=p.left+'px';
  t.el.style.width=p.size+'px';t.el.style.height=p.size+'px';
}

function spawnTile(){
  const empty=[];
  for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++)if(grid[r][c]===0)empty.push([r,c]);
  if(!empty.length)return null;
  const[r,c]=empty[Math.floor(Math.random()*empty.length)];
  const val=Math.random()<0.9?2:4;
  grid[r][c]=val;
  const id=tileId++;
  const el=createTileEl(id,val,r,c,true);
  tileObjs[id]={value:val,row:r,col:c,el,id};
  return id;
}
function clearTiles(){tileLayerEl.innerHTML='';tileObjs={};}

// ═══════════════════════════════════════════
//  UI UPDATES
// ═══════════════════════════════════════════
function updateStats(){
  for(const k of['military','economy','culture','faith']) stats[k]=Math.max(0,Math.min(100,stats[k]));
  document.getElementById('milBar').style.width=stats.military+'%';
  document.getElementById('milVal').textContent=stats.military;
  document.getElementById('ecoBar').style.width=stats.economy+'%';
  document.getElementById('ecoVal').textContent=stats.economy;
  document.getElementById('culBar').style.width=stats.culture+'%';
  document.getElementById('culVal').textContent=stats.culture;
  document.getElementById('faiBar').style.width=stats.faith+'%';
  document.getElementById('faiVal').textContent=stats.faith;

  // Danger indicators
  const dangerThreshold = 15;
  document.getElementById('statMil').classList.toggle('danger', stats.military <= dangerThreshold);
  document.getElementById('statEco').classList.toggle('danger', stats.economy <= dangerThreshold);
  document.getElementById('statCul').classList.toggle('danger', stats.culture <= dangerThreshold);
  document.getElementById('statFai').classList.toggle('danger', stats.faith <= dangerThreshold);
}

function updateComboUI() {
  comboIcons.innerHTML = '';
  if (comboStreak <= 0) {
    comboBar.className = 'combo-bar';
    comboMult.textContent = '';
    return;
  }
  const isLegendary = comboStreak >= 8;
  const isHot = comboStreak >= 5;
  for (let i = 0; i < Math.min(comboStreak, 14); i++) {
    const dot = document.createElement('div');
    dot.className = 'combo-icon' + (isLegendary ? ' legendary' : isHot ? ' fire' : '');
    dot.style.animationDelay = (i * 0.04) + 's';
    comboIcons.appendChild(dot);
  }
  const mult = getComboMultiplier();
  comboMult.textContent = mult > 1 ? '×' + mult.toFixed(1) : '';
  comboMult.className = 'combo-mult' + (isLegendary ? ' legendary' : isHot ? ' hot' : '');
  comboBar.className = 'combo-bar' + (isLegendary ? ' legendary' : isHot ? ' hot' : comboStreak >= 2 ? ' active' : '');
}

function getComboMultiplier() {
  if (comboStreak < 2) return 1;
  return 1 + (comboStreak - 1) * 0.2;
}

function updateEra(){
  let maxTile=2;
  for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++)if(grid[r][c]>maxTile)maxTile=grid[r][c];
  highestTile=maxTile;
  const eraKeys=Object.keys(ERA_NAMES).map(Number).sort((a,b)=>a-b);
  let era=eraKeys[0];
  for(const k of eraKeys)if(maxTile>=k)era=k;

  if (era !== currentEraKey && era > currentEraKey) {
    currentEraKey = era;
    showEraBanner(ERA_NAMES[era], ERA_DESCS[era] || '');
    eraLabelEl.classList.add('advancing');
    setTimeout(() => eraLabelEl.classList.remove('advancing'), 2000);
  }
  currentEraKey = era;
  eraLabelEl.textContent=ERA_NAMES[era]||ERA_NAMES[2];
  const yearKeys=Object.keys(YEAR_MAP).map(Number).sort((a,b)=>a-b);
  let yr=yearKeys[0];
  for(const k of yearKeys)if(maxTile>=k)yr=k;
  yearEl.textContent=YEAR_MAP[yr]||YEAR_MAP[2];
}

function addLog(msg){
  const d=document.createElement('div');
  d.className='log-entry';
  d.textContent='📜 '+msg;
  eventLogEl.prepend(d);
  if(eventLogEl.children.length>25)eventLogEl.removeChild(eventLogEl.lastChild);
}

function updateScore(){
  scoreEl.textContent=score;
  scoreEl.parentElement.classList.remove('score-pop');
  void scoreEl.parentElement.offsetWidth;
  scoreEl.parentElement.classList.add('score-pop');
  if(score > highScore){
    highScore = score;
    highScoreEl.textContent = highScore;
  }
}

function updateFooterStats(){
  document.getElementById('moveCount').textContent = moveCount;
  document.getElementById('bestStreak').textContent = bestStreak;
  document.getElementById('totalMergesDisplay').textContent = totalMerges;
}

// ═══════════════════════════════════════════
//  EVENTS & CHOICES
// ═══════════════════════════════════════════
function checkEvent(maxMergedValue){
  const eventKeys=Object.keys(EVENTS).map(Number).sort((a,b)=>a-b);
  for(const k of eventKeys){
    if(maxMergedValue>=k && !triggeredEvents.has(k)){
      triggeredEvents.add(k);
      setTimeout(()=>showEvent(k), 600);
      return;
    }
  }
}

function showEvent(key){
  moveLocked=true;
  const ev=EVENTS[key];
  let html=`<div class="modal-era">${ERA_NAMES[key]||'A New Age'}</div>`;
  html+=`<div class="modal-title">${ev.title}</div>`;
  html+=`<div class="modal-desc">${ev.desc}</div>`;
  html+=`<div class="modal-choices">`;
  ev.choices.forEach((ch,i)=>{
    html+=`<div class="choice-btn" onclick="makeChoice(${key},${i})">`;
    html+=`<div class="choice-name">${ch.name}</div>`;
    html+=`<div class="choice-desc">${ch.desc}</div>`;
    html+=`<div class="choice-effects">`;
    ch.effectTags.forEach(tag=>{
      html+=`<span class="effect-tag ${tag.c}">${tag.t}</span>`;
    });
    html+=`</div></div>`;
  });
  html+=`</div>`;
  modalEl.innerHTML=html;
  modalOverlay.style.display='flex';
}

window.makeChoice=function(key,idx){
  const ch=EVENTS[key].choices[idx];
  if(ch.effects.military) stats.military+=ch.effects.military;
  if(ch.effects.economy) stats.economy+=ch.effects.economy;
  if(ch.effects.culture) stats.culture+=ch.effects.culture;
  if(ch.effects.faith) stats.faith+=ch.effects.faith;
  if(ch.bonus==='score') score+=ch.bonusAmt;
  updateStats(); updateScore(); addLog(ch.log);
  modalOverlay.style.display='none';
  moveLocked=false;
  screenFlash('rgba(212,166,58,0.15)');
};

// ═══════════════════════════════════════════
//  LEGACY RATING
// ═══════════════════════════════════════════
function getLegacyRating() {
  const avg = (stats.military + stats.economy + stats.culture + stats.faith) / 4;
  const tileBonus = Math.log2(highestTile) * 3;
  const total = avg + tileBonus + (bestStreak * 2);
  if (total >= 80) return { title:'Eternal Legend', color:'#ffd700', stars:'★★★★★' };
  if (total >= 60) return { title:'Great Empire', color:'#c0a0ff', stars:'★★★★' };
  if (total >= 45) return { title:'Notable Realm', color:'#80c0ff', stars:'★★★' };
  if (total >= 30) return { title:'Minor Kingdom', color:'#f0d080', stars:'★★' };
  return { title:'Forgotten Settlement', color:'#808080', stars:'★' };
}

//  GAME FLOW
// ═══════════════════════════════════════════
function newGame(){
  grid=Array.from({length:SIZE},()=>Array(SIZE).fill(0));
  score=0; gameOverFlag=false; wonFlag=false; continueAfterWin=false;
  prevState=null; highestTile=2;
  stats={military:10,economy:10,culture:10,faith:10};
  triggeredEvents=new Set(); moveLocked=false;
  comboStreak=0; totalMerges=0; moveCount=0; currentEraKey=2;
  shownAchievements.clear();
  clearTiles();
  overlayEl.style.display='none';
  modalOverlay.style.display='none';
  eventLogEl.innerHTML='';
  particleLayerEl.innerHTML='';
  spawnTile(); spawnTile();
  updateScore(); updateStats(); updateEra(); updateComboUI(); updateFooterStats();
  addLog('A band of settlers makes camp beside a river...');
}

function saveState(){
  prevState={
    grid:grid.map(r=>[...r]), score,
    stats:{...stats},
    tileData:Object.values(tileObjs).map(t=>({value:t.value,row:t.row,col:t.col})),
    comboStreak, totalMerges, moveCount
  };
}
function undo(){
  if(!prevState||moveLocked)return;
  grid=prevState.grid; score=prevState.score;
  stats={...prevState.stats};
  comboStreak=prevState.comboStreak;
  totalMerges=prevState.totalMerges;
  moveCount=prevState.moveCount;
  gameOverFlag=false;
  overlayEl.style.display='none';
  clearTiles();
  for(const td of prevState.tileData){
    const id=tileId++;
    const el=createTileEl(id,td.value,td.row,td.col,false);
    tileObjs[id]={value:td.value,row:td.row,col:td.col,el,id};
  }
  prevState=null;
  updateScore(); updateStats(); updateEra(); updateComboUI(); updateFooterStats();
}

function move(dir){
  if(gameOverFlag||moveLocked)return;
  initAudio();
  saveState();
  let moved=false, mergedScore=0;
  const mergedTiles=[], removeTiles=[];
  let maxMergedValue=0;
  let mergeCount = 0;

  const tileMap={};
  for(const t of Object.values(tileObjs)) tileMap[t.row+','+t.col]=t;

  const ranges={
    up:{rOrder:[0,1,2,3],cOrder:[0,1,2,3],dr:-1,dc:0},
    down:{rOrder:[3,2,1,0],cOrder:[0,1,2,3],dr:1,dc:0},
    left:{rOrder:[0,1,2,3],cOrder:[0,1,2,3],dr:0,dc:-1},
    right:{rOrder:[0,1,2,3],cOrder:[3,2,1,0],dr:0,dc:1},
  };
  const{rOrder,cOrder,dr,dc}=ranges[dir];
  const merged=Array.from({length:SIZE},()=>Array(SIZE).fill(false));
  const newGrid=Array.from({length:SIZE},()=>Array(SIZE).fill(0));
  const newTileMap={};

  for(const r of rOrder){
    for(const c of cOrder){
      if(grid[r][c]===0)continue;
      const tile=tileMap[r+','+c];
      let nr=r,nc=c;
      while(true){
        const nnr=nr+dr,nnc=nc+dc;
        if(nnr<0||nnr>=SIZE||nnc<0||nnc>=SIZE)break;
        if(newGrid[nnr][nnc]===0){nr=nnr;nc=nnc;}
        else if(newGrid[nnr][nnc]===grid[r][c]&&!merged[nnr][nnc]){nr=nnr;nc=nnc;break;}
        else break;
      }
      if(nr!==r||nc!==c)moved=true;
      if(newGrid[nr][nc]===grid[r][c]&&newGrid[nr][nc]!==0){
        const nv=grid[r][c]*2;
        newGrid[nr][nc]=nv;
        merged[nr][nc]=true;
        mergedScore+=nv;
        mergeCount++;
        if(nv>maxMergedValue)maxMergedValue=nv;
        const ex=newTileMap[nr+','+nc];
        if(ex)removeTiles.push(ex);
        tile.row=nr;tile.col=nc;tile.value=nv;
        updateTilePos(tile);
        mergedTiles.push(tile);
        newTileMap[nr+','+nc]=tile;
        moved=true;
      } else {
        newGrid[nr][nc]=grid[r][c];
        tile.row=nr;tile.col=nc;
        updateTilePos(tile);
        newTileMap[nr+','+nc]=tile;
      }
    }
  }
  if(!moved){prevState=null;return;}
  grid=newGrid;
  moveCount++;

  // Combo system
  if (mergeCount > 0) {
    comboStreak++;
    totalMerges += mergeCount;
    if (comboStreak > bestStreak) bestStreak = comboStreak;
    if (comboStreak >= 2) playComboSound(comboStreak);
  } else {
    comboStreak = 0;
  }

  const multiplier = getComboMultiplier();
  const finalScore = Math.round(mergedScore * multiplier);
  score += finalScore;

  if(mergedScore>0){
    const gain=Math.floor(mergedScore/20);
    if(gain>0){
      const comboBonus = comboStreak >= 3 ? 2 : comboStreak >= 2 ? 1 : 0;
      stats.economy+=Math.ceil(gain*0.3) + comboBonus;
      stats.culture+=Math.ceil(gain*0.2) + comboBonus;
      if (comboStreak >= 4) { stats.military += 1; stats.faith += 1; }
    }
  }

  setTimeout(()=>{
    for(const t of removeTiles){t.el.remove();delete tileObjs[t.id];}

    for(const t of mergedTiles){
      t.el.dataset.value=t.value;
      t.el.querySelector('span').textContent=t.value;
      const existingName=t.el.querySelector('.tile-name');
      if(TILE_NAMES[t.value]){
        if(existingName) existingName.textContent=TILE_NAMES[t.value];
        else{const nm=document.createElement('div');nm.className='tile-name';nm.textContent=TILE_NAMES[t.value];t.el.appendChild(nm);}
      } else if(existingName) existingName.remove();
      const p=getTilePos(t.row,t.col);
      t.el.style.width=p.size+'px';t.el.style.height=p.size+'px';
      t.el.classList.add('merged');
      setTimeout(()=>t.el.classList.remove('merged'),350);

      // ── EFFECTS ──
      const tilePos = getTilePos(t.row, t.col);
      const {tileSize} = getTileSize();
      const cx = tilePos.left + tileSize/2;
      const cy = tilePos.top + tileSize/2;
      const color = TILE_COLORS[t.value] || '#ffd700';

      playMergeSound(t.value);

      // Particles
      const log = Math.log2(t.value);
      const particleCount = Math.min(6 + log * 3, 30);
      const particleSize = 3 + log * 0.5;
      const spread = 30 + log * 8;
      spawnParticles(cx, cy, particleCount, color, particleSize, spread);

      // Rings for big merges
      if (t.value >= 32) spawnRing(cx, cy, color);
      if (t.value >= 256) setTimeout(() => spawnRing(cx, cy, color), 100);

      // Floating score
      showFloatingScore(cx - 20, cy - 20, t.value, color);

      // Flavor text from v1
      showMergeFlavor(cx, cy, t.value);

      // Board shake for big merges
      if (t.value >= 128) {
        boardEl.classList.remove('shake', 'bigshake');
        void boardEl.offsetWidth;
        boardEl.classList.add(t.value >= 512 ? 'bigshake' : 'shake');
        setTimeout(() => boardEl.classList.remove('shake', 'bigshake'), 500);
      }

      // Board flash for medium+ merges
      if (t.value >= 32 && t.value < 128) boardFlash('fire');
      if (t.value >= 128 && t.value < 512) boardFlash('golden');
      if (t.value >= 512) boardFlash('epic');

      // Screen flash for huge merges
      if (t.value >= 256) screenFlash(`${color}20`);
    }

    spawnTile();
    updateScore(); updateStats(); updateEra(); updateComboUI(); updateFooterStats();

    checkAchievements({
      score, totalMerges, streak: comboStreak,
      mergesThisMove: mergeCount, maxTile: highestTile
    });

    // Streak log messages
    if (comboStreak === 3) addLog('Your people are inspired! A streak of progress!');
    if (comboStreak === 5) addLog('The empire burns with ambition! Unstoppable!');
    if (comboStreak === 8) addLog('History will remember this age of glory!');
    if (comboStreak === 10) addLog('A golden thread runs through your dynasty!');
    if (comboStreak === 12) addLog('The gods themselves take notice of your reign!');

    if (mergeCount >= 3) addLog('A brilliant move! Three unions in a single decree!');
    else if (mergeCount >= 2) addLog('A shrewd maneuver — two merges at once!');

    if(maxMergedValue>0) checkEvent(maxMergedValue);
    checkGameState();
  },150);
}

function checkGameState(){
  if(!wonFlag&&!continueAfterWin){
    for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++)
      if(grid[r][c]===2048){wonFlag=true;setTimeout(()=>showOverlay('win'),800);return;}
  }
  for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++)if(grid[r][c]===0)return;
  for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++){
    if(c<SIZE-1&&grid[r][c]===grid[r][c+1])return;
    if(r<SIZE-1&&grid[r][c]===grid[r+1][c])return;
  }
  gameOverFlag=true;
  showOverlay('gameover');
}

function showOverlay(type){
  overlayEl.style.display='flex';
  const summary = `⚔️${stats.military} 🪙${stats.economy} 🏛️${stats.culture} ✨${stats.faith}`;
  const legacy = getLegacyRating();
  const streakLine = `Best streak: ${bestStreak} · Total merges: ${totalMerges} · Moves: ${moveCount}`;

  if(type==='win'){
    // Victory particle burst
    for (let i = 0; i < 60; i++) {
      setTimeout(() => {
        const x = Math.random() * boardEl.offsetWidth;
        const y = Math.random() * boardEl.offsetHeight;
        spawnParticles(x, y, 5, '#ffd700', 5, 60);
      }, i * 50);
    }
    overlayEl.innerHTML=`
      <h2 class="win-text">Eternal Empire!</h2>
      <div class="legacy-rating" style="color:${legacy.color}">${legacy.stars}<br>${legacy.title}</div>
      <p>Score: ${score} · ${summary}</p>
      <p style="color:rgba(255,255,255,0.25);font-size:0.7rem">${streakLine}</p>
      <button class="btn" onclick="continueGame()">Keep Expanding</button>
      <button class="btn" onclick="newGame()">New Empire</button>`;
  } else {
    const entries=Object.entries(stats);
    entries.sort((a,b)=>a[1]-b[1]);
    const weakest=entries[0][0];
    const reasons={military:'conquered by invaders',economy:'bankrupted by debt',culture:'forgotten by history',faith:'torn apart by internal strife'};
    overlayEl.innerHTML=`
      <h2 class="go-text">Empire Fallen</h2>
      <p>Your empire was ${reasons[weakest]}.</p>
      <div class="legacy-rating" style="color:${legacy.color}">${legacy.stars}<br>${legacy.title}</div>
      <p>Score: ${score} · ${summary}</p>
      <p style="color:rgba(255,255,255,0.25);font-size:0.7rem">${streakLine}</p>
      <button class="btn" onclick="newGame()">Rise Again</button>
      <button class="btn" onclick="undo()">Undo</button>`;
  }
}
function continueGame(){continueAfterWin=true;overlayEl.style.display='none';}

// ─── INPUT ───
document.addEventListener('keydown',e=>{
  const map={ArrowUp:'up',ArrowDown:'down',ArrowLeft:'left',ArrowRight:'right',w:'up',s:'down',a:'left',d:'right'};
  if(map[e.key]){e.preventDefault();move(map[e.key]);}
});
let tx,ty;
document.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
document.addEventListener('touchend',e=>{
  if(tx==null)return;
  const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;
  if(Math.max(Math.abs(dx),Math.abs(dy))<30)return;
  if(Math.abs(dx)>Math.abs(dy))move(dx>0?'right':'left');
  else move(dy>0?'down':'up');
  tx=null;
},{passive:true});

window.addEventListener('resize',()=>{for(const t of Object.values(tileObjs))updateTilePos(t);});

newGame();
</script>
